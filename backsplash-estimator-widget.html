              <rect x="23" y="30" width="20" height="12" fill="#e8e2d8"/>
              <!-- Bullnose tiles: same cream as field tile — it IS the same tile, just rounded.
                   Bezier control point at x=90 creates a strong convex curve clipped at x=72. -->
              <path d="M45,2  H60 C90,2  90,14 60,14 H45 Z" fill="#e8e2d8"/>
              <path d="M45,16 H60 C90,16 90,28 60,28 H45 Z" fill="#e8e2d8"/>
              <path d="M45,30 H60 C90,30 90,42 60,42 H45 Z" fill="#e8e2d8"/>
              <!-- Shadow at the base of the curve to show 3D roundover -->
              <path d="M60,2  C90,2  90,14 60,14" fill="rgba(0,0,0,0.10)"/>
              <path d="M60,16 C90,16 90,28 60,28" fill="rgba(0,0,0,0.10)"/>
              <path d="M60,30 C90,30 90,42 60,42" fill="rgba(0,0,0,0.10)"/>
              <!-- Glaze highlight along top-shoulder of curve -->
              <path d="M60,3  C80,5  82,10 64,13" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M60,17 C80,19 82,24 64,27" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M60,31 C80,33 82,38 64,41" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="2.5" stroke-linecap="round"/>
            </svg>`,
            'Bullnose Tile','Matching tile with a factory-rounded finished edge','~$10–13 / linear ft installed','The classic professional finish. Seamlessly matches your field tile. Best when your tile manufacturer makes a matching bullnose piece.')}
          ${opt('edgeTreat','schluter-alum',
            `<svg viewBox="0 0 72 44" width="72" height="44" xmlns="http://www.w3.org/2000/svg">
              <!-- SCHLUTER ALUMINUM: field tiles + bright polished-aluminum L-trim.
                   Prominent vertical face (silver) + visible horizontal flange (L-profile). -->
              <rect width="72" height="44" fill="#9a9188"/>
              <rect x="1" y="2"  width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="16" width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="30" width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="2"  width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="16" width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="30" width="20" height="12" fill="#e8e2d8"/>
              <!-- Partial edge tile (tile butts against L-trim from behind) -->
              <rect x="45" y="2"  width="11" height="12" fill="#e8e2d8"/>
              <rect x="45" y="16" width="11" height="12" fill="#e8e2d8"/>
              <rect x="45" y="30" width="11" height="12" fill="#e8e2d8"/>
              <!-- L-trim vertical face: bright polished aluminum (#c8d8e4 silver-blue) -->
              <rect x="57" y="0" width="15" height="44" fill="#c8d8e4"/>
              <!-- Polished highlight — left edge brightest (facing viewer) -->
              <rect x="57" y="0" width="4"  height="44" fill="rgba(255,255,255,0.55)"/>
              <!-- Mid reflection band typical of extruded aluminum -->
              <rect x="63" y="0" width="3"  height="44" fill="rgba(255,255,255,0.20)"/>
              <!-- Shadow at right edge showing the metal has depth -->
              <rect x="69" y="0" width="3"  height="44" fill="rgba(0,40,70,0.25)"/>
              <!-- L-trim horizontal flange: extends LEFT over tile top — the defining L-shape -->
              <rect x="43" y="0" width="29" height="5" fill="#d4e2ec"/>
              <rect x="43" y="0" width="29" height="2" fill="rgba(255,255,255,0.50)"/>
              <rect x="43" y="3" width="29" height="2" fill="rgba(0,40,80,0.15)"/>
            </svg>`,
            'Schluter — Aluminum','Clean L-profile metal trim caps the tile edge','~$12–16 / linear ft installed','Our most popular modern finish. The aluminum L-trim slides over the tile edge and anchors into the thinset bed. Durable, clean, protects tile corners from chipping.')}
          ${opt('edgeTreat','schluter-accent',
            `<svg viewBox="0 0 72 44" width="72" height="44" xmlns="http://www.w3.org/2000/svg">
              <!-- SCHLUTER MATTE BLACK: same L-profile as alum but near-black matte finish.
                   Use slightly darker field tile to evoke a modern/dark kitchen pairing. -->
              <rect width="72" height="44" fill="#9a9188"/>
              <!-- Field tiles slightly warmer/darker to contrast the black trim -->
              <rect x="1" y="2"  width="20" height="12" fill="#ddd8ce"/>
              <rect x="1" y="16" width="20" height="12" fill="#ddd8ce"/>
              <rect x="1" y="30" width="20" height="12" fill="#ddd8ce"/>
              <rect x="23" y="2"  width="20" height="12" fill="#ddd8ce"/>
              <rect x="23" y="16" width="20" height="12" fill="#ddd8ce"/>
              <rect x="23" y="30" width="20" height="12" fill="#ddd8ce"/>
              <!-- Partial edge tile -->
              <rect x="45" y="2"  width="11" height="12" fill="#ddd8ce"/>
              <rect x="45" y="16" width="11" height="12" fill="#ddd8ce"/>
              <rect x="45" y="30" width="11" height="12" fill="#ddd8ce"/>
              <!-- L-trim vertical face: true matte black (#141414) — stark vs silver alum -->
              <rect x="57" y="0" width="15" height="44" fill="#141414"/>
              <!-- Matte black has a very subtle soft highlight (matte, not mirror-like) -->
              <rect x="57" y="0" width="3"  height="44" fill="rgba(255,255,255,0.08)"/>
              <!-- Faint brushed-metal horizontal lines across face -->
              <line x1="57" y1="11" x2="72" y2="11" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
              <line x1="57" y1="22" x2="72" y2="22" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
              <line x1="57" y1="33" x2="72" y2="33" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
              <!-- L-trim horizontal flange: matte black, extends left over tiles -->
              <rect x="43" y="0" width="29" height="5" fill="#1a1a1a"/>
              <rect x="43" y="0" width="29" height="1.5" fill="rgba(255,255,255,0.07)"/>
            </svg>`,
            'Schluter — Matte Black / Brushed Nickel','Same L-profile trim in premium decorative finishes','~$14–18 / linear ft installed','Same installer process as aluminum, but finished in matte black or brushed nickel. Pairs beautifully with matching plumbing fixtures.')}
          ${opt('edgeTreat','pencil-liner',
            `<svg viewBox="0 0 72 44" width="72" height="44" xmlns="http://www.w3.org/2000/svg">
              <!-- PENCIL LINER: field tiles + a NARROW (pencil-width ~6px) decorative tile strip.
                   Multiple small liner pieces with visible grout joints — clearly TILE not metal.
                   High contrast charcoal + glazed highlight + grout gaps = unmistakably tile. -->
              <rect width="72" height="44" fill="#9a9188"/>
              <rect x="1" y="2"  width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="16" width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="30" width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="2"  width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="16" width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="30" width="20" height="12" fill="#e8e2d8"/>
              <!-- Larger partial field tile — gives pencil liner more breathing room -->
              <rect x="45" y="2"  width="16" height="12" fill="#e8e2d8"/>
              <rect x="45" y="16" width="16" height="12" fill="#e8e2d8"/>
              <rect x="45" y="30" width="16" height="12" fill="#e8e2d8"/>
              <!-- Pencil liner: NARROW (6px) charcoal tile strip — multiple small pieces visible -->
              <!-- Each 12px tile row gets multiple liner pieces with clear grout joints (~1px) -->
              <rect x="63" y="2"  width="6" height="5"  fill="#3c3830"/>
              <rect x="63" y="8"  width="6" height="5"  fill="#3c3830"/>
              <rect x="63" y="16" width="6" height="5"  fill="#3c3830"/>
              <rect x="63" y="22" width="6" height="5"  fill="#3c3830"/>
              <rect x="63" y="30" width="6" height="5"  fill="#3c3830"/>
              <rect x="63" y="36" width="6" height="5"  fill="#3c3830"/>
              <!-- Glazed highlight top edge of each piece — proves it's fired ceramic, not metal -->
              <rect x="63" y="2"  width="6" height="1.5" fill="rgba(255,245,220,0.30)"/>
              <rect x="63" y="8"  width="6" height="1.5" fill="rgba(255,245,220,0.30)"/>
              <rect x="63" y="16" width="6" height="1.5" fill="rgba(255,245,220,0.30)"/>
              <rect x="63" y="22" width="6" height="1.5" fill="rgba(255,245,220,0.30)"/>
              <rect x="63" y="30" width="6" height="1.5" fill="rgba(255,245,220,0.30)"/>
              <rect x="63" y="36" width="6" height="1.5" fill="rgba(255,245,220,0.30)"/>
            </svg>`,
            'Pencil Liner / Decorative Liner','Thin accent tile strip used as a decorative border','~$9–14 / linear ft installed','A narrow strip in a contrasting color or material — adds traditional elegance and visual separation at the edge of the installation.')}
          ${opt('edgeTreat','mitered',
            `<svg viewBox="0 0 72 44" width="72" height="44" xmlns="http://www.w3.org/2000/svg">
              <!-- MITERED: 3/4 perspective showing tile wrapping the corner — NO trim hardware.
                   Bright miter line = precision 45° cut. Side face shows matching tile continuing. -->
              <rect width="72" height="44" fill="#9a9188"/>

              <rect x="1"  y="2"  width="16" height="12" fill="#e8e2d8"/>
              <rect x="1"  y="16" width="16" height="12" fill="#e8e2d8"/>
              <rect x="1"  y="30" width="16" height="12" fill="#e8e2d8"/>
              <rect x="19" y="2"  width="16" height="12" fill="#e8e2d8"/>
              <rect x="19" y="16" width="16" height="12" fill="#e8e2d8"/>
              <rect x="19" y="30" width="16" height="12" fill="#e8e2d8"/>
              <!-- Miter line: bright white = precision 45° cut, no hardware -->
              <line x1="36" y1="1" x2="36" y2="43" stroke="#ffffff" stroke-width="3"/>
              <line x1="37.5" y1="1" x2="37.5" y2="43" stroke="#5a5248" stroke-width="1" opacity="0.35"/>
              <!-- Side face tiles in perspective (same tile, turned corner) -->
              <polygon points="37,2 71,8 71,37 37,42" fill="#ccc4b8"/>
              <!-- Side face grout lines (3 rows, converging) -->
              <line x1="37" y1="15" x2="71" y2="17.5" stroke="#9a9188" stroke-width="1.2"/>
              <line x1="37" y1="28" x2="71" y2="29"   stroke="#9a9188" stroke-width="1.2"/>
              <!-- Vertical grout (2 cols) on side face -->
              <line x1="53" y1="4" x2="53" y2="40" stroke="#9a9188" stroke-width="1" opacity="0.6"/>
              <!-- Depth shadow overlay -->
              <polygon points="37,2 71,8 71,37 37,42" fill="#000" opacity="0.05"/>
            </svg>`,
            'Mitered Edge','Two tiles cut at 45° — zero visible hardware','~$15–22 / linear ft','The most premium finish. Two tiles meet at a precision-cut 45° miter corner with no trim piece whatsoever. Requires a wet-saw with a tilting blade. We\'ll confirm feasibility at measure.')}
          ${opt('edgeTreat','none',
            `<svg viewBox="0 0 72 44" width="72" height="44" xmlns="http://www.w3.org/2000/svg">
              <!-- NO TRIM: tile ends behind a cabinet — no exposed edge treatment needed -->
              <rect width="72" height="44" fill="#8c8478"/>
              <rect x="1" y="2"  width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="16" width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="30" width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="2"  width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="16" width="20" height="12" fill="#e8e2d8"/>
              <rect x="23" y="30" width="20" height="12" fill="#e8e2d8"/>
              <!-- Cabinet covering the right portion (tile edge hidden behind it) -->
              <rect x="44" y="0" width="28" height="44" fill="#c4b06e"/>
              <!-- Cabinet door top -->
              <rect x="46" y="2"  width="24" height="18" rx="2" fill="#d0bc78" stroke="#a89040" stroke-width="0.8"/>
              <!-- Cabinet door bottom -->
              <rect x="46" y="22" width="24" height="18" rx="2" fill="#d0bc78" stroke="#a89040" stroke-width="0.8"/>
              <!-- Door inset panels -->
              <rect x="48" y="4"  width="20" height="14" rx="1" fill="#c4b46e"/>
              <rect x="48" y="24" width="20" height="14" rx="1" fill="#c4b46e"/>
              <!-- Door gap line -->
              <rect x="44" y="20" width="28" height="2" fill="#a89040"/>
              <!-- Door handles -->
              <rect x="67" y="10" width="2" height="5" rx="1" fill="#887830"/>
              <rect x="67" y="28" width="2" height="5" rx="1" fill="#887830"/>
            </svg>`,
            'No Exposed Edges','Tile terminates behind a cabinet or appliance','No trim cost','If your backsplash is fully enclosed — upper cabinets above, countertop below, appliances on the sides — no exposed trim may be needed at all.')}
        </div>
        <div id="trim-lf-wrap" style="${showLf?'':'display:none'};margin-top:18px">
          <label class="lbl">Linear feet of exposed edge <span class="opt-note">${autoLf?'(auto-filled from your drawing)':''}</span></label>
          <input class="inp" type="number" id="ftlf" min="0" max="200" placeholder="e.g. 14" value="${S.trimLinFt||''}" style="width:160px">
          <div style="font-size:14px;color:var(--gray-3);margin-top:5px">Typical range: 8–20 linear feet for a standard kitchen</div>
        </div>`;},
    bind(){
      bindOpts('edgeTreat');
      const tog=()=>{
        const el=$('trim-lf-wrap');
        if(!el){ document.removeEventListener('opt-ch',tog); return; } // self-clean on step change
        el.style.display=S.edgeTreat&&S.edgeTreat!=='none'?'block':'none';
      };
      document.addEventListener('opt-ch',tog);
      $('ftlf')?.addEventListener('input',e=>{S.trimLinFt=parseFloat(e.target.value)||0;updEstBar();});

    validate(){
      if(!S.edgeTreat) return false;
      if(S.edgeTreat!=='none') S.trimLinFt=parseFloat($('ftlf')?.value)||0;
      return true;
    }},

// Compress a photo File to a base64 JPEG (max 800px wide, 75% quality)
async function compressPhoto(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 800;
        const scale = img.width > MAX ? MAX / img.width : 1;
        const c = document.createElement('canvas');
        c.width  = Math.round(img.width  * scale);
        c.height = Math.round(img.height * scale);
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = () => resolve(null);
      img.src = e.target.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(file);
  });
}

async function zapier(extra={}) {
  // Read photos as full-res base64 — Apps Script stores originals in Google Drive
  let spacePhotos = [];
  let tilePhoto   = null;
  if (SPACE_FILES.length || TILE_FILE) {
    $('btn-next').textContent = 'Reading photos…';
    const toBase64 = file => new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload  = e => resolve(e.target.result);  // full data: URI, no compression
      r.onerror = reject;
      r.readAsDataURL(file);
    });
    spacePhotos = await Promise.all(SPACE_FILES.map(toBase64));
    if (TILE_FILE) tilePhoto = await toBase64(TILE_FILE);
  }
  const {sms, notificationHtml, clientEstimateHtml, low, high, mat} = S.tileType
    ? buildEstimateSummary()
    : {low:0,high:0,mat:0,sms:'',notificationHtml:'',clientEstimateHtml:''};

  const payload = { ...extra,
    // Lead contact
    name:`${S.firstName} ${S.lastName}`.trim(), firstName:S.firstName, lastName:S.lastName,
    phone:S.phone, email:S.email, address:S.address, zip:S.zip,
    // Project data
    measureMode:S.measureMode, sqft:S.sqft, tileType:S.tileType, tileFormat:S.tileFormat,
    pattern:S.pattern, groutJoint:S.groutJoint, groutType:S.groutType,
    edgeTreat:S.edgeTreat, trimLinFt:S.trimLinFt, demo:S.demo,
    drywallRepair:S.drywallRepair, outlets:S.outlets, surfaceType:S.surfaceType,
    timeline:S.timeline, tileUrl:S.tileUrl,
    // Computed estimates
    laborLow:low, laborHigh:high, materialEst:mat, totalLow:low+mat, totalHigh:high+mat,
    spacePhotoCount:SPACE_FILES.length, hasTilePhoto:!!TILE_FILE,
    spacePhotos,   // full-res base64 — Apps Script uploads to Google Drive
    tilePhoto,     // full-res base64 or null
    // Formatted emails for Zapier actions
    notificationHtml,      // Action 1: send to office@craftedbacksplash.com (you)
    clientEstimateHtml,    // Action 2: send to {{email}} (the homeowner)
    clientEmail: S.email,
    estimateSmsText: sms,                   // plain-text fallback
    estimateEmailHtml: clientEstimateHtml,  // backward compat alias
    emailSubject:`Your Crafted Backsplash Estimate — ${fmt(low)}–${fmt(high)} labor`,
    source:'Website Estimator Widget', submitted:new Date().toISOString(),
  };
  try {
    // Route via Apps Script (Drive + forward to Zapier); fallback direct to Zapier
    // Always post to Zapier for emails; also try Apps Script for Drive (fire-and-forget)
    if (CFG.ZAPIER && !CFG.ZAPIER.includes('YOUR_')) {
      await fetch(CFG.ZAPIER, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload), mode:'no-cors' });
    }
    if (CFG.SCRIPT && !CFG.SCRIPT.includes('YOUR_')) {
      fetch(CFG.SCRIPT, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload), mode:'no-cors' }).catch(()=>{});
    }
  } catch(e){ console.warn('Submit:', e); }
}

async function handleSubmit() {
  const btn=$('btn-next'); btn.textContent='Sending…'; btn.disabled=true;
  await zapier();
  fireConversion(); // Google Ads — full estimate path
  try { sessionStorage.removeItem(SS_KEY); } catch(e) {}
  showThanks();
}

  $('cb-prog-track').setAttribute('aria-valuenow', 100);
  $('cb-step-lbl').textContent='✓ Estimate complete';
  const {low,high,mat,bill,fixedCost,demoAmt,drywAmt,outAmt,tileAmt,trimAmt,totalHrs} = S.tileType ? calcEst() : {low:0,high:0,mat:0,bill:0,fixedCost:0,demoAmt:0,drywAmt:0,outAmt:0,tileAmt:0,trimAmt:0,totalHrs:0};
  const fmt = n => '$'+Math.round(n).toLocaleString();
  const tileLabels = {ceramic:'Ceramic / Subway',porcelain:'Porcelain',glass:'Glass Tile',stone:'Natural Stone',mosaic:'Mosaic Sheets','large-format':'Large Format Porcelain'};
  const patLabels  = {straight:'Straight Stack','running-bond':'Running Bond ½ Offset','third-offset':'Running Bond ⅓ Offset','third-stairstep':'Running Bond ⅓ Offset (Stair-Step)',vertical:'Vertical Stack',diagonal:'Diagonal 45°',herringbone:'Herringbone',chevron:'Chevron','random-stone':'Random Stone / Ledger',hexagon:'Hexagon',penny:'Penny / Round Mosaic',complex:'Custom Pattern'};

  const breakdownRows = S.tileType ? `
    <tr><td>Overhead (drive, setup, cleanup)</td><td style="text-align:right;font-weight:700">${fmt(fixedCost)}</td></tr>
    <tr><td>Tile setting labor</td><td style="text-align:right;font-weight:700">~${fmt(tileAmt)}</td></tr>
    ${demoAmt ? `<tr><td>Demo existing tile</td><td style="text-align:right;font-weight:700">${fmt(demoAmt)}</td></tr>` : ''}
    ${drywAmt ? `<tr><td>Drywall / backer repair</td><td style="text-align:right;font-weight:700">~${fmt(drywAmt)}</td></tr>` : ''}
    ${trimAmt ? `<tr><td>Edge trim (${S.trimLinFt} ln ft)</td><td style="text-align:right;font-weight:700">~${fmt(trimAmt)}</td></tr>` : ''}
    ${outAmt  ? `<tr><td>Outlet / switch cutouts</td><td style="text-align:right;font-weight:700">${fmt(outAmt)}</td></tr>` : ''}
    <tr style="background:#f5f2ee;border-top:2px solid #e0dbd4"><td style="font-weight:900">Labor Range</td><td style="text-align:right;font-weight:900;color:#8B1A1A">${fmt(low)} – ${fmt(high)}</td></tr>
    <tr style="background:#f5f2ee"><td style="color:#7a7268">Tile materials (est.)</td><td style="text-align:right;color:#7a7268">~${fmt(mat)}</td></tr>
    <tr style="background:#f5f2ee"><td style="color:#7a7268">Total range</td><td style="text-align:right;color:#7a7268">~${fmt(low+mat)} – ${fmt(high+mat)}</td></tr>
  ` : '';

  $('cb-content').innerHTML=`<div id="cb-ty">
    <div class="ty-icon">🎉</div>
    <div class="ty-title">You're all set, ${S.firstName}!</div>
    <div class="ty-sub">Your estimate details have been emailed to you. We'll reach out within one business day to schedule your free on-site measure — no obligation.</div>
    <div class="ty-est">
      <div class="ty-est-lbl">Your Labor Estimate</div>
      <div class="ty-est-val">${fmt(low)} – ${fmt(high)}</div>
      <div class="ty-est-note">+ ~${fmt(mat)} tile materials · Total ~${fmt(low+mat)}–${fmt(high+mat)}</div>
    </div>
    <a class="ty-cta ty-book" href="${CFG.BOOKING}" target="_blank" rel="noopener">
      📅 Schedule Your Free Measure
    </a>
    <a class="ty-cta ty-call" href="tel:${CFG.PHONE_RAW}">📞 Call / Text: ${CFG.PHONE}</a>
    <div class="ty-steps">
      <div class="ty-step"><div class="ty-num">1</div><div class="ty-txt"><strong>Book your free measure</strong>Use the button above to pick a time — usually available within a few days.</div></div>
      <div class="ty-step"><div class="ty-num">2</div><div class="ty-txt"><strong>We measure on-site</strong>We come to you, take exact measurements, review the surface.</div></div>
      <div class="ty-step"><div class="ty-num">3</div><div class="ty-txt"><strong>Written fixed-price quote</strong>Detailed and itemized — no surprises. Usually within 24 hrs of the measure.</div></div>
      <div class="ty-step"><div class="ty-num">4</div><div class="ty-txt"><strong>Schedule your install</strong>Most kitchen backsplashes take 1–2 days. We handle everything.</div></div>
    </div>
    ${S.tileType ? `
    <div style="border:1px solid #e0dbd4;border-radius:11px;overflow:hidden;margin-bottom:22px;text-align:left">
      <div style="background:#f5f2ee;padding:10px 16px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#5c0f0f;border-bottom:1px solid #e0dbd4;display:flex;justify-content:space-between;align-items:center">
        <span>Estimate Breakdown</span>
        <span style="font-size:12px;color:#7a7268;font-weight:600;text-transform:none;letter-spacing:0">${S.sqft} sq ft · ${tileLabels[S.tileType]||''} · ${patLabels[S.pattern]||''}</span>
      </div>
      <table style="width:100%;border-collapse:collapse">
        ${breakdownRows}
      </table>
      <div style="padding:12px 16px;border-top:1px solid #e0dbd4">
        <button onclick="printEstimate()" style="width:100%;padding:12px;background:var(--charcoal);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">
          🖨️ Save / Download Full PDF Report
        </button>
      </div>
    </div>` : ''}
    <div class="ty-disc">This estimate is for planning purposes only, based on standard Omaha/Lincoln market rates. Actual costs may vary based on site conditions and tile selection. Crafted Backsplash provides a written fixed-price quote before any work begins — no surprises.</div>
  </div>`;
}


// ============================================================
//  RENDER ENGINE
// ============================================================
function renderStep() {
  // Clear canvas buffer before DOM removal to prevent GPU-compositor ghost
  if (DS.ctx) {
    DS.ctx.clearRect(0, 0, DS.W, DS.H);
  }
  DS.canvas = null;
  DS.ctx    = null;

  const st = STEPS[S.step];
  $('cb-prog-fill').style.width = st.prog+'%';
  $('cb-prog-track').setAttribute('aria-valuenow', st.prog);
  $('cb-step-lbl').textContent  = st.badge;
  $('cb-content').innerHTML     = `<div class="cb-card">
    <div class="cb-badge">${st.badge}</div>
    <div class="cb-title">${st.title}</div>
    <div class="cb-subtitle">${st.sub}</div>
    ${st.render()}
  </div>`;
  if(st.bind) st.bind();
  $('btn-back').style.display = S.step>0 ? '' : 'none';
  $('btn-next').textContent   = S.step===STEPS.length-1 ? '📧 Send My Estimate →' : S.step===STEPS.length-2 ? 'Continue →' : S.step===STEPS.length-3 ? '📸 Continue →' : 'Continue →';
  $('btn-next').disabled      = false;
  // Hide escape hatch on the final booking step — they're already committing
  $('btn-escape').style.display = S.step===STEPS.length-1 ? 'none' : '';
  updEstBar();
}

// ============================================================
//  SESSION PERSISTENCE — saves form state to sessionStorage
//  so a page refresh or accidental navigation doesn't wipe answers
// ============================================================
const SS_KEY = 'cb_est_v3';

function saveSession() {
  try {
    const ser = {
      S: Object.assign({}, S),
      DS_shapes: DS.shapes.map(sh => ({
        points: sh.points,
        sqFt:   sh.sqFt,
        edgeLabels: sh.edgeLabels,
        outlets:  (sh.outlets  || []),
        switches: (sh.switches || []),
      })),
      DS_SCALE: DS.SCALE,
    };
    sessionStorage.setItem(SS_KEY, JSON.stringify(ser));
  } catch(e) { /* ignore quota errors */ }
}

function loadSession() {
  try {
    const raw = sessionStorage.getItem(SS_KEY);
    if (!raw) return;
    const ser = JSON.parse(raw);
    // Restore scalar state (skip file objects — not serializable)
    Object.assign(S, ser.S);
    // Restore canvas shapes
    DS.shapes = ser.DS_shapes || [];
    DS.SCALE  = ser.DS_SCALE  || 6;
  } catch(e) { sessionStorage.removeItem(SS_KEY); }
}

// Navigation
$('btn-next').addEventListener('click', ()=>{
  const st=STEPS[S.step];
  if(st.validate && !st.validate()) return;
  if(S.step<STEPS.length-1){ S.step++; renderStep(); saveSession(); scrollTo({top:0,behavior:'smooth'}); }
  else handleSubmit();
});
$('btn-back').addEventListener('click', ()=>{
  if(S.step>0){ S.step--; renderStep(); saveSession(); scrollTo({top:0,behavior:'smooth'}); }
});

// Restore any previous session, then render
loadSession();
renderStep();
// postMessage height reporter
function reportHeight() {
  const wrap = document.getElementById('cb-wrap');
  if (!wrap) return;
  const h = wrap.offsetTop + wrap.offsetHeight + 80;
  window.parent.postMessage({ type: 'cb-resize', height: h }, '*');
}
reportHeight();
const _ro = new ResizeObserver(reportHeight);
_ro.observe(document.getElementById('cb-wrap') || document.body);
</script>
</body>
