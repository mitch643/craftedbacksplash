/* ================================================================
   CRAFTED BACKSPLASH ESTIMATOR v3
   Accessibility-first. Large text, high contrast, big targets.
   Canvas tool: Draw | Label Edges | Place Outlets/Switches
   CONFIG block is near the bottom of the <script> tag.
================================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --charcoal:  #1a1a1a;
  --gold:      #8B1A1A;   /* brand crimson */
  --gold-lt:   #c44040;   /* lighter crimson */
  --gold-dk:   #5c0f0f;   /* deep crimson */
  --bg:        #f7f4f1;
  --white:     #ffffff;
  --gray-1:    #f0ece6;
  --gray-2:    #d5cec4;
  --gray-3:    #7a7268;
  --red:       #c0392b;
  --radius:    14px;
  --shadow:    0 4px 28px rgba(0,0,0,0.11);

  /* Edge label colors */
  --trim-col:      #e74c3c;
  --cabinet-col:   #2980b9;
  --counter-col:   #8B1A1A;
  --window-col:    #16a085;
  --appliance-col: #8e44ad;
}

/* ── Base ── */
html { font-size: 17px; }
body {
  font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--charcoal);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px 16px 64px;
  line-height: 1.5;
}

#cb-wrap { width: 100%; max-width: 740px; }

/* ── Header ── */
#cb-header { text-align: center; margin-bottom: 10px; }
#cb-brand  { font-size: 12px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold-dk); margin-bottom: 4px; }
#cb-title  { font-size: 24px; font-weight: 900; color: var(--charcoal); margin-bottom: 16px; line-height: 1.25; font-family: 'Playfair Display', Georgia, serif; }

/* ── Progress ── */
#cb-prog-track { background: var(--gray-2); border-radius: 99px; height: 7px; margin-bottom: 6px; overflow: hidden; }
#cb-prog-fill  { background: var(--gold); height: 100%; border-radius: 99px; transition: width .4s ease; }
#cb-step-lbl   { font-size: 13px; color: var(--gray-3); text-align: right; margin-bottom: 18px; font-weight: 600; }

/* ── Card ── */
.cb-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px 28px 26px;
  margin-bottom: 14px;
}
.cb-badge    { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
.cb-title    { font-size: 22px; font-weight: 900; color: var(--charcoal); margin-bottom: 6px; line-height: 1.25; }
.cb-subtitle { font-size: 16px; color: var(--gray-3); margin-bottom: 24px; line-height: 1.5; }

/* ── Educational callout ── */
.edu {
  background: #fdf0f0;
  border-left: 4px solid var(--gold);
  border-radius: 0 10px 10px 0;
  padding: 13px 15px;
  margin: 10px 0 20px;
  font-size: 15px;
  color: #3a1010;
  line-height: 1.6;
}
.edu-tag { font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; color: var(--gold-dk); display: block; margin-bottom: 4px; }
.edu strong { color: var(--gold-dk); }

/* ── Options grid ── */
.opts      { display: grid; gap: 10px; }
.opts.c2   { grid-template-columns: 1fr 1fr; }
.opts.c3   { grid-template-columns: 1fr 1fr 1fr; }

.opt {
  border: 2.5px solid var(--gray-2);
  border-radius: 12px;
  padding: 16px 14px 14px;
  cursor: pointer;
  transition: border-color .18s, background .18s;
  position: relative;
  min-height: 56px;
}
.opt:hover { border-color: var(--gold-lt); background: #fdf0f0; }
.opt.sel   { border-color: var(--gold); background: #fdf0f0; }
.opt.sel::after { content: '✓'; position: absolute; top: 11px; right: 13px; color: var(--gold); font-weight: 900; font-size: 16px; }
.opt-icon  { font-size: 10px; margin-bottom: 8px; line-height: 1; }
.opt-icon svg { display: block; }
.opt-label { font-size: 16px; font-weight: 800; color: var(--charcoal); margin-bottom: 3px; }
.opt-sub   { font-size: 14px; color: var(--gray-3); line-height: 1.4; }
.opt-cost  { font-size: 13px; font-weight: 700; color: var(--gold-dk); margin-top: 5px; }
.opt-tip   { font-size: 14px; color: #3a1010; background: #fdf0f0; border-radius: 7px; padding: 8px 11px; margin-top: 9px; line-height: 1.55; display: none; }
.opt.sel .opt-tip { display: block; }

/* ── Inputs ── */
.field { margin-bottom: 16px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.lbl  { display: block; font-size: 15px; font-weight: 700; color: var(--charcoal); margin-bottom: 7px; }
.lbl .opt-note { font-weight: 400; color: var(--gray-3); }
.inp  {
  width: 100%;
  border: 2.5px solid var(--gray-2);
  border-radius: 9px;
  padding: 12px 14px;
  font-size: 16px;
  color: var(--charcoal);
  background: var(--white);
  transition: border-color .2s;
  font-family: inherit;
  min-height: 48px;
}
.inp:focus { outline: none; border-color: var(--gold); }
.err { color: var(--red); font-size: 14px; margin-top: 5px; display: none; }
.err.show { display: block; }

/* ── Checkboxes ── */
.checks { display: flex; flex-direction: column; gap: 10px; }
.chk {
  display: flex; align-items: flex-start; gap: 14px; cursor: pointer;
  padding: 14px 15px; border: 2.5px solid var(--gray-2); border-radius: 12px; transition: border-color .18s;
}
.chk:hover { border-color: var(--gold-lt); }
.chk input { width: 22px; height: 22px; margin-top: 1px; accent-color: var(--gold); flex-shrink: 0; cursor: pointer; }
.chk-lbl { font-size: 16px; font-weight: 700; color: var(--charcoal); margin-bottom: 2px; }
.chk-sub { font-size: 14px; color: var(--gray-3); line-height: 1.4; }

/* ── Stepper ── */
.stepper { display: flex; align-items: center; border: 2.5px solid var(--gray-2); border-radius: 9px; overflow: hidden; width: fit-content; }
.stepper button { background: var(--gray-1); border: none; width: 48px; height: 48px; font-size: 24px; cursor: pointer; color: var(--charcoal); font-family: inherit; transition: background .15s; }
.stepper button:hover { background: var(--gold-lt); }
.stepper span { width: 52px; text-align: center; font-size: 20px; font-weight: 900; }

/* ── Est bar ── */
#cb-est-bar {
  background: #2c1a12; border-radius: 11px;
  padding: 14px 20px; display: flex; align-items: center;
  justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 14px;
}
.est-lbl  { font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--gold-lt); margin-bottom: 2px; }
.est-val  { font-size: 22px; font-weight: 900; color: var(--white); }
.est-note { font-size: 13px; color: var(--gray-3); }

/* ── Navigation ── */
#cb-nav  { display: flex; flex-direction: column; gap: 10px; }
#nav-row { display: flex; gap: 10px; }

.btn-back {
  background: none; border: 2.5px solid var(--gray-2); border-radius: 9px;
  padding: 14px 22px; font-size: 16px; font-weight: 700; color: var(--gray-3);
  cursor: pointer; transition: all .18s; font-family: inherit; white-space: nowrap; min-height: 52px;
}
.btn-back:hover { border-color: var(--charcoal); color: var(--charcoal); }

.btn-next {
  flex: 1; background: var(--gold); border: none; border-radius: 9px;
  padding: 14px 20px; font-size: 17px; font-weight: 900; color: var(--white);
  cursor: pointer; transition: background .18s; font-family: inherit; min-height: 52px;
}
.btn-next:hover { background: var(--gold-dk); }
.btn-next:disabled { background: var(--gray-2); cursor: not-allowed; }

/* ── ESCAPE HATCH — large and obvious ── */
#btn-escape {
  width: 100%;
  background: var(--white);
  border: 2.5px solid var(--gold);
  border-radius: 10px;
  padding: 15px 20px;
  font-size: 17px;
  font-weight: 700;
  color: var(--charcoal);
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all .18s;
  min-height: 54px;
  letter-spacing: 0.01em;
}
#btn-escape:hover { background: #fdf0f0; border-color: var(--gold-dk); }
#btn-escape .esc-icon { font-size: 20px; }

/* ══════════════════════════════════════
   CANVAS DRAWING TOOL
══════════════════════════════════════ */

/* Measure path selector */
.mpath-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 22px; }
.mpath-card {
  border: 2.5px solid var(--gray-2); border-radius: 12px;
  padding: 20px 14px; cursor: pointer; text-align: center; transition: all .18s;
}
.mpath-card:hover  { border-color: var(--gold-lt); background: #fdf0f0; }
.mpath-card.active { border-color: var(--gold); background: #fdf0f0; }
.mpath-card.skip-c { border-color: var(--gold-lt); border-style: dashed; }
.mpath-card.skip-c:hover { border-color: var(--gold-dk); background: #fdf0f0; }
.mpath-icon  { font-size: 32px; margin-bottom: 8px; }
.mpath-lbl   { font-size: 16px; font-weight: 800; color: var(--charcoal); margin-bottom: 4px; }
.mpath-sub   { font-size: 13px; color: var(--gray-3); line-height: 1.4; }

/* Canvas toolbar */
#canvas-toolbar {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  background: var(--gray-1); border-radius: 10px 10px 0 0;
  padding: 10px 12px; border: 2px solid var(--gray-2); border-bottom: none;
}
.tool-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--white); border: 2px solid var(--gray-2); border-radius: 8px;
  padding: 8px 13px; font-size: 14px; font-weight: 700; color: var(--gray-3);
  cursor: pointer; font-family: inherit; transition: all .18s; min-height: 40px; white-space: nowrap;
}
.tool-btn:hover { border-color: var(--gold); color: var(--charcoal); }
.tool-btn.active { background: var(--charcoal); border-color: var(--charcoal); color: var(--white); }
.tool-btn.active:hover { background: var(--gold-dk); border-color: var(--gold-dk); }
.tool-sep { width: 1px; background: var(--gray-2); height: 32px; margin: 0 3px; }
.scale-wrap { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; color: var(--gray-3); }
.scale-wrap select { font-size: 14px; border: 2px solid var(--gray-2); border-radius: 7px; padding: 6px 10px; font-family: inherit; background: var(--white); min-height: 38px; }

/* Canvas area */
#canvas-wrap { position: relative; border: 2.5px solid var(--gray-2); overflow: hidden; background: #faf9f6; border-radius: 0 0 10px 10px; }
#draw-canvas { display: block; width: 100%; cursor: crosshair; touch-action: none; }
#canvas-tip  { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: var(--gray-3); font-size: 15px; line-height: 1.6; pointer-events: none; padding: 24px; }
#canvas-tip .ti { font-size: 40px; margin-bottom: 10px; }
/* Instruction bar that lives BELOW the canvas, never overlaps the drawing */
#canvas-hint {
  background: #eef4f8;
  border: 1.5px solid #93bcd4;
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 10px 16px;
  font-size: 14px;
  color: var(--charcoal);
  line-height: 1.5;
  display: none;
}
#canvas-hint .hint-icon { font-size: 18px; margin-right: 6px; vertical-align: middle; }
#canvas-hint strong { color: #17557a; }

/* Edge label popup */
#edge-label-ui {
  display: none;
  background: #faf7f4; border-radius: 0 0 10px 10px;
  padding: 14px 16px; border: 1.5px solid var(--gray-2); border-top: 3px solid var(--gold);
}
.el-title { font-size: 14px; font-weight: 800; color: var(--charcoal); margin-bottom: 10px; letter-spacing: 0.02em; }
.el-btns  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.el-btn   {
  border: 2.5px solid transparent; border-radius: 8px;
  padding: 10px 12px; font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: inherit; transition: all .15s; min-height: 44px;
  display: flex; align-items: center; gap: 8px; text-align: left;
}
.el-swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

/* Canvas summary bar */
#canvas-summary {
  display: none;
  background: #2c1a12; border-radius: 9px;
  margin: 10px 0 4px; overflow: hidden;
}
#canvas-summary > div:first-child { display: flex; align-items: stretch; }
.sum-item { flex: 1; text-align: center; padding: 10px 8px; }
.sum-val  { font-size: 17px; font-weight: 900; color: var(--white); }
.sum-lbl  { font-size: 10px; color: var(--gold-lt); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-top: 2px; }
.sum-div  { width: 1px; background: rgba(255,255,255,0.15); margin: 6px 0; }

/* Legend */
#edge-legend { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0 6px; }
.leg-item { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 700; color: var(--charcoal);
  background: var(--white); border: 1.5px solid var(--gray-2); border-radius: 20px; padding: 4px 10px 4px 6px; }
.leg-dot  { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

/* Manual measurement */
.mrow { display: flex; align-items: center; gap: 8px; margin-bottom: 11px; flex-wrap: wrap; }
.mlbl { font-size: 14px; font-weight: 700; color: var(--gray-3); min-width: 58px; }
.mx   { font-size: 18px; color: var(--gray-2); font-weight: 300; }
.msf  { font-size: 14px; color: var(--gray-3); min-width: 74px; }
.munit{ font-size: 13px; font-weight: 800; color: var(--white); background: #2c1a12; border-radius: 5px; padding: 3px 7px; letter-spacing: .03em; }
.msf span { font-weight: 800; color: var(--charcoal); }
.rm-sec { background: none; border: none; color: var(--gray-3); font-size: 22px; cursor: pointer; padding: 0 6px; line-height: 1; }
.rm-sec:hover { color: var(--red); }
#add-sec-btn { background: none; border: 2px dashed var(--gray-2); border-radius: 9px; padding: 9px 16px; font-size: 15px; color: var(--gray-3); cursor: pointer; transition: all .18s; margin-top: 4px; font-family: inherit; }
#add-sec-btn:hover { border-color: var(--gold); color: var(--gold-dk); }
.mtotal { background: var(--gray-1); border-radius: 9px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 15px; margin-top: 12px; }
.mtotal strong { font-size: 18px; font-weight: 900; }

/* Skip screen */
#cb-skip { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 40px 28px; text-align: center; }
.sk-icon  { font-size: 52px; margin-bottom: 14px; }
.sk-title { font-size: 26px; font-weight: 900; color: var(--charcoal); margin-bottom: 8px; }
.sk-sub   { font-size: 16px; color: var(--gray-3); line-height: 1.6; margin-bottom: 28px; max-width: 440px; margin-left: auto; margin-right: auto; }
.sk-opts  { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 22px; }
.sk-opt   { border: 2.5px solid var(--gray-2); border-radius: 13px; padding: 24px 18px; }
.sk-opt-icon  { font-size: 36px; margin-bottom: 10px; }
.sk-opt-title { font-size: 17px; font-weight: 900; color: var(--charcoal); margin-bottom: 6px; }
.sk-opt-sub   { font-size: 14px; color: var(--gray-3); margin-bottom: 16px; line-height: 1.5; }
.sk-btn { display: block; width: 100%; border-radius: 9px; padding: 14px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; transition: all .18s; text-decoration: none; border: none; min-height: 50px; }
.sk-gold { background: var(--gold); color: var(--white); }
.sk-gold:hover { background: var(--gold-dk); color: var(--white); }
.sk-out  { background: none; border: 2.5px solid var(--charcoal) !important; color: var(--charcoal); }
.sk-out:hover { background: var(--charcoal); color: var(--white); }
.sk-resume { font-size: 15px; color: var(--gray-3); margin-top: 12px; }
.sk-resume a { color: var(--gold-dk); cursor: pointer; text-decoration: underline; font-weight: 700; }

/* Thank you */
#cb-ty { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 44px 28px; text-align: center; }
.ty-icon  { font-size: 56px; margin-bottom: 14px; }
.ty-title { font-size: 28px; font-weight: 900; color: var(--charcoal); margin-bottom: 8px; }
.ty-sub   { font-size: 16px; color: var(--gray-3); line-height: 1.7; max-width: 420px; margin: 0 auto 26px; }
.ty-est   { background: #2c1a12; border-radius: 13px; padding: 22px; margin-bottom: 22px; }
.ty-est-lbl { font-size: 12px; color: var(--gold-lt); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; font-weight: 800; }
.ty-est-val { font-size: 36px; font-weight: 900; color: var(--white); margin-bottom: 4px; }
.ty-est-note { font-size: 13px; color: var(--gray-3); }
.ty-steps { text-align: left; background: var(--gray-1); border-radius: 11px; padding: 20px 22px; margin-bottom: 22px; }
.ty-step  { display: flex; gap: 14px; margin-bottom: 15px; }
.ty-step:last-child { margin: 0; }
.ty-num   { width: 28px; height: 28px; background: var(--gold); border-radius: 50%; font-size: 14px; font-weight: 900; color: var(--white); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.ty-txt   { font-size: 15px; color: var(--charcoal); line-height: 1.5; }
.ty-txt strong { display: block; font-size: 16px; }
.ty-cta   { display: block; width: 100%; background: var(--gold); color: var(--white); border: none; border-radius: 11px; padding: 17px; font-size: 18px; font-weight: 900; cursor: pointer; font-family: inherit; transition: all .18s; text-decoration: none; margin-bottom: 10px; min-height: 56px; text-align: center; }
.ty-cta:hover { background: var(--gold-dk); color: var(--white); }
.ty-book  { background: var(--gold); font-size: 20px; padding: 20px; margin-bottom: 0; }
.ty-book:hover { background: var(--gold-dk); }
.ty-call  { background: transparent; color: var(--gray-3); border: 2px solid var(--gray-2); font-size: 15px; padding: 12px; min-height: auto; margin-top: 0; margin-bottom: 20px; }
.ty-call:hover { background: var(--gray-1); color: var(--charcoal); }
.ty-or    { text-align: center; font-size: 13px; color: var(--gray-3); margin: 10px 0; }
.ty-disc { font-size: 13px; color: var(--gray-3); line-height: 1.6; margin-top: 14px; }

/* Results */
.res-box   { background: #2c1a12; border-radius: 13px; padding: 22px; margin-bottom: 18px; text-align: center; }
.res-lbl   { font-size: 12px; color: var(--gold-lt); letter-spacing: 1px; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; }
.res-val   { font-size: 38px; font-weight: 900; color: var(--white); margin-bottom: 3px; }
.res-note  { font-size: 13px; color: var(--gray-3); }
.res-table { background: var(--gray-1); border-radius: 11px; padding: 14px 18px; margin-bottom: 16px; }
.res-row   { display: flex; justify-content: space-between; font-size: 15px; padding: 5px 0; border-bottom: 1px solid var(--gray-2); }
.res-row:last-child { border: none; font-weight: 900; font-size: 16px; padding-top: 10px; }
.res-row span:first-child { color: var(--gray-3); }

/* Responsive */
@media (max-width: 540px) {
  html { font-size: 16px; }
  .cb-card { padding: 22px 16px 20px; }
  .opts.c2, .opts.c3 { grid-template-columns: 1fr 1fr; }
  .field-row { grid-template-columns: 1fr; }
  .mpath-grid { grid-template-columns: 1fr; }
  .sk-opts   { grid-template-columns: 1fr; }
  #canvas-toolbar { flex-wrap: wrap; }
  #edge-legend { display: none; }
}
  </style>

<body>
<div id="cb-wrap">

  <!-- Header -->
  <div id="cb-header">
    <div id="cb-brand">Crafted Backsplash · Omaha &amp; Lincoln, NE</div>
    <div id="cb-title">Get Your Free Instant Estimate</div>
    <div id="cb-prog-track" role="progressbar" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100" aria-label="Estimation progress"><div id="cb-prog-fill" style="width:10%"></div></div>
    <div id="cb-step-lbl">Step 1 of 10</div>
  </div>

  <!-- Running estimate bar -->
  <div id="cb-est-bar" style="display:none">
    <div>
      <div class="est-lbl">Current Labor Estimate</div>

// ============================================================
//  PRICING ENGINE — hourly rate model
//  Rate: $75/hr | Fixed: 4 hrs/job | Variable: 0.15 hrs/sqft × adj
// ============================================================
function calcEst() {
  const RATE = 75;                   // $/hr — billable labor rate
  const sq   = S.sqft || 30;
  const bill = sq * 1.12;            // billed sq ft with 12% waste factor

  // ── Fixed hours every job ──────────────────────────────────
  // Drive + unload Day 1: 1.0 hr
  // Protect surfaces + snap layout lines: 1.0 hr
  // Drive + grout day setup: 1.0 hr
  // Final cleanup, outlets, walk-through: 1.0 hr
  const FIXED_HRS = 4.0;             // $300 baked into every job

  // ── Variable hours: tile setting ──────────────────────────
  const typeAdj  = {ceramic:1.00,porcelain:1.25,glass:1.40,stone:1.45,mosaic:1.45,'large-format':1.30}[S.tileType]||1.15;
  const patAdj   = {straight:1.00,'running-bond':1.00,'third-offset':1.05,'third-stairstep':1.05,vertical:1.05,diagonal:1.40,herringbone:1.75,chevron:1.95,'random-stone':1.65,hexagon:1.45,penny:1.25,complex:2.30}[S.pattern]||1.00;
  const fmtAdj   = {'tiny-mosaic':1.20,subway:1.00,medium:1.00,large:1.10,jumbo:1.20}[S.tileFormat]||1.00;
  // Tight grout joints require precision leveling and slower tile placement
  const groutAdj = {'no-spacer':1.08,sixteenth:1.05,eighth:1.00,quarter:1.00}[S.groutJoint] || 1.00;

  // ── P/A complexity multiplier ──────────────────────────────
  // Canvas mode: auto-computed from drawn shape perimeter/sqrt(area)
  // Manual mode: from homeowner's answer to the space complexity question
  let paAdj = 1.00;
  if (S.measureMode === 'draw' && S.shapePA) {
    if      (S.shapePA < 9.0)  paAdj = 1.00;
    else if (S.shapePA < 11.5) paAdj = 1.08;
    else if (S.shapePA < 14.0) paAdj = 1.18;
    else                       paAdj = 1.30;
  } else if (S.manualComplexity) {
    paAdj = {simple:1.00, moderate:1.12, complex:1.25}[S.manualComplexity] || 1.00;
  }

  // tileSettingHrs is tracked separately so we can show a line-item breakdown
  const tileSettingHrs = bill * 0.15 * typeAdj * patAdj * fmtAdj * paAdj * groutAdj
                       + (S.groutType==='epoxy' ? bill * 0.067 : 0); // epoxy: tight working window
  let totalHrs = FIXED_HRS + tileSettingHrs;

  // ── Add-ons ────────────────────────────────────────────────
  const demoHrs = S.demo          ? sq * 0.053 : 0;               // demo: ~19 sqft/hr = $4/sqft
  const drywHrs = S.drywallRepair ? Math.max(1.5, sq * 0.04) : 0; // drywall: scales with job size
  const outHrs  = (S.outlets||0) * 1.0;                           // outlets/switches: 1 hr each (precision cutouts)
  const trimHrs = (S.trimLinFt||0) *
    ({bullnose:0.15,'schluter-alum':0.18,'schluter-accent':0.20,'pencil-liner':0.22,mitered:0.35,none:0}[S.edgeTreat]||0);
  totalHrs += demoHrs + drywHrs + outHrs + trimHrs;

  // ── Dollar amounts ─────────────────────────────────────────
  const lab      = totalHrs * RATE;
  const labLow   = Math.round(lab * 0.85 / 25) * 25;
  const labHigh  = Math.round(lab * 1.15 / 25) * 25;
  const low      = Math.max(700, labLow);
  const high     = Math.max(low + 100, labHigh);                  // always at least $100 above low
  // Material estimate: pattern-aware waste (diagonal/herringbone need 15–20% more tile)
  const matWaste = {diagonal:1.15,herringbone:1.18,chevron:1.18,'random-stone':1.20,hexagon:1.15,complex:1.20}[S.pattern] || 1.12;
  const mat      = Math.round(sq*({ceramic:5,porcelain:8,glass:20,stone:22,mosaic:14,'large-format':10}[S.tileType]||7)*matWaste/25)*25;
  const fixedCost= Math.round(FIXED_HRS * RATE);                  // $300 baked into job overhead
  const demoAmt  = S.demo          ? Math.round(demoHrs * RATE / 25) * 25 : 0;
  const drywAmt  = S.drywallRepair ? Math.round(drywHrs * RATE / 25) * 25 : 0;
  const outAmt   = Math.round(outHrs * RATE);
  const tileAmt  = Math.round(tileSettingHrs * RATE / 25) * 25;
  const trimAmt  = Math.round(trimHrs * RATE / 25) * 25;
  return { low, high, mat, bill: Math.round(bill), fixedCost, demoAmt, drywAmt, outAmt, tileAmt, trimAmt, totalHrs };
}

// ============================================================
//  OPTION + BIND HELPERS
// ============================================================
function opt(key, val, icon, label, sub, cost='', tip='') {
  const isSvg = icon.startsWith('<svg');
  const iconHtml = isSvg ? `<div class="opt-icon">${icon}</div>` : `<div class="opt-icon" style="font-size:28px;margin-bottom:8px">${icon}</div>`;
  const sel = S[key] === val ? ' sel' : '';
  return `<div class="opt${sel}" data-key="${key}" data-val="${val}">
    ${iconHtml}
    <div class="opt-label">${label}</div>
    <div class="opt-sub">${sub}</div>
    ${cost ? `<div class="opt-cost">${cost}</div>` : ''}
    ${tip  ? `<div class="opt-tip">${tip}</div>`  : ''}
  </div>`;
}

function bindOpts(key) {
  document.querySelectorAll(`.opt[data-key="${key}"]`).forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll(`.opt[data-key="${key}"]`).forEach(x => x.classList.remove('sel'));
      el.classList.add('sel');
      S[key] = el.dataset.val;
      updEstBar();
      document.dispatchEvent(new Event('opt-ch'));
    });
  });
}

// ============================================================
//  CANVAS FUNCTIONS
// ============================================================
function initCanvas() {
  const c = $('draw-canvas');
  if (!c) return;
  DS.canvas = c;
  const wrap = c.parentElement;
  const W = wrap.clientWidth;
  const H = Math.max(300, Math.round(W * 0.6));
  const dpr = window.devicePixelRatio || 1;
  c.style.width  = W + 'px';
  c.style.height = H + 'px';
  c.width  = W * dpr;
  c.height = H * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  DS.ctx = ctx; DS.W = W; DS.H = H;

  c.addEventListener('click',      e => canvasClick(e));
  c.addEventListener('dblclick',   () => { if (DS.tool==='draw' && DS.inProg.length>=3) closePoly(); });
  c.addEventListener('mousemove',  e => canvasMove(e));
  c.addEventListener('mouseleave', () => { DS.mouse=null; DS.hovEdge=null; draw(); });
  c.addEventListener('touchstart', e => { e.preventDefault(); canvasTouch(e); }, {passive:false});
  c.addEventListener('touchmove',  e => {
    e.preventDefault();
    if (DS.tool==='select' && !splitModeEdge) {
      const raw = cPos(e);
      DS.mouse = raw;
      DS.hovEdge = nearestEdge(raw.x, raw.y);
      draw();
    }
  }, {passive:false});

  draw();
  tipUpdate();
  summaryUpdate();
}

function cPos(e) {
  const r = DS.canvas.getBoundingClientRect();
  const cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
  const cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
  return {x:cx, y:cy};
}

function snap(p) { return {x: Math.round(p.x/DS.GRID)*DS.GRID, y: Math.round(p.y/DS.GRID)*DS.GRID}; }

function canvasTouch(e) {
  const raw = cPos(e);
  const p   = snap(raw);
  if (DS.tool==='draw')        processClick(p, raw);
  else if (DS.tool==='select') selectClick(raw);
  else if (DS.tool==='outlet') { DS.outlets.push(p); syncFromCanvas(); draw(); summaryUpdate(); }
  else if (DS.tool==='switch') { DS.switches.push(p); syncFromCanvas(); draw(); summaryUpdate(); }
}
function canvasClick(e) {
  const raw = cPos(e);
  const p   = snap(raw);
  if (DS.tool==='draw')     processClick(p, raw);
  else if (DS.tool==='select')   selectClick(raw);
  else if (DS.tool==='outlet')   { DS.outlets.push(p); syncFromCanvas(); draw(); summaryUpdate(); }
  else if (DS.tool==='switch')   { DS.switches.push(p); syncFromCanvas(); draw(); summaryUpdate(); }
}

function canvasMove(e) {
  const raw = cPos(e);
  if (DS.tool==='draw')   { DS.mouse = snap(raw); DS.hovEdge=null; DS.hovVertex=null; }
  else if (DS.tool==='select') {
    DS.mouse = raw;
    if (!splitModeEdge) {
      DS.hovEdge = nearestEdge(raw.x, raw.y);
      // Check vertex proximity (radius 10px) for delete handle
      DS.hovVertex = null;
      const checkShapeVerts = (sh, si) => {
        sh.points.forEach((p, vi) => {
          if (Math.hypot(raw.x - p.x, raw.y - p.y) < 10) DS.hovVertex = {si, vi};
        });
      };
      if (DS.stagingShape) checkShapeVerts(DS.stagingShape, -1);
      DS.shapes.forEach((sh, si) => checkShapeVerts(sh, si));
      DS.canvas.style.cursor = DS.hovVertex ? 'pointer' : '';
    }
  }
  else { DS.mouse = snap(raw); DS.hovVertex=null; }
  draw();
}

function processClick(p, raw) {
  if (DS.inProg.length >= 3) {
    const f = DS.inProg[0];
    if (Math.hypot(p.x-f.x, p.y-f.y) <= DS.GRID) { closePoly(); return; }
  }
  DS.inProg.push(p);
  draw();
  tipUpdate();
}

function closePoly() {
  if (DS.inProg.length < 3) return;
  const pts  = DS.inProg.slice();
  const pxA  = shoelace(pts);
  const ip   = DS.SCALE / DS.GRID;
  const sqFt = +(pxA * ip * ip / 144).toFixed(1);
  // Place in staging — user must label all edges before saving
  DS.stagingShape = { points: pts, sqFt, edgeLabels: {} };
  DS.inProg = [];
  // Auto-switch to label mode so user sees edge-labeling UI
  setTool('select');
  syncFromCanvas();
  draw(); tipUpdate(); summaryUpdate();
}

function shoelace(pts) {
  let a = 0;
  for (let i=0; i<pts.length; i++) {
    const j = (i+1)%pts.length;
    a += pts[i].x*pts[j].y - pts[j].x*pts[i].y;
  }
  return Math.abs(a)/2;
}

function syncFromCanvas() {
  // sq ft = all saved sections + staging (if present)
  const allShapes = [...DS.shapes, ...(DS.stagingShape ? [DS.stagingShape] : [])];
  S.sqft = allShapes.reduce((t,s) => t+s.sqFt, 0);
  // trim linear footage from all labeled 'trim' edges
  let lf = 0;
  allShapes.forEach(sh => {
    const n = sh.points.length;
    for (let i=0; i<n; i++) {
      if (sh.edgeLabels[i]==='trim') {
        const j=(i+1)%n, p1=sh.points[i], p2=sh.points[j];
        lf += Math.hypot(p2.x-p1.x, p2.y-p1.y) * (DS.SCALE/DS.GRID) / 12;
      }
    }
  });
  S.trimLinFt = +lf.toFixed(1);
  // Compute total perimeter (all edges) for P/A complexity ratio
  let totalPerimFt = 0;
  allShapes.forEach(sh => {
    const n = sh.points.length;
    for (let i = 0; i < n; i++) {
      const j = (i+1) % n, p1 = sh.points[i], p2 = sh.points[j];
      totalPerimFt += Math.hypot(p2.x - p1.x, p2.y - p1.y) * (DS.SCALE / DS.GRID) / 12;
    }
  });
  S.shapePA = S.sqft > 0 ? +(totalPerimFt / Math.sqrt(S.sqft)).toFixed(2) : null;
  // Outlets = current canvas + all saved sections' outlets
  S.outlets = DS.outlets.length + DS.switches.length
    + DS.shapes.reduce((t,s) => t + (s.outlets||[]).length + (s.switches||[]).length, 0);
  updEstBar();
}

// Edge hit-test
function distSeg(px,py,x1,y1,x2,y2) {
  const dx=x2-x1, dy=y2-y1, l2=dx*dx+dy*dy;
  if (!l2) return Math.hypot(px-x1,py-y1);
  const t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/l2));
  return Math.hypot(px-(x1+t*dx), py-(y1+t*dy));
}
function nearestEdge(mx,my, hitRadius=20) {
  let best=null, bd=hitRadius;
  // Check stagingShape first (si=-1)
  if (DS.stagingShape) {
    const sh=DS.stagingShape, n=sh.points.length;
    for (let i=0; i<n; i++) {
      const j=(i+1)%n, p1=sh.points[i], p2=sh.points[j];
      const d=distSeg(mx,my,p1.x,p1.y,p2.x,p2.y);
      if (d<bd) { bd=d; best={si:-1,ei:i}; }
    }
  }
  // Saved shapes are not rendered on canvas so they are not selectable
  return best;
}

function selectClick(raw) {
  // Delete vertex if hovered (must have ≥4 points to keep a valid polygon)
  if (DS.hovVertex) {
    const {si, vi} = DS.hovVertex;
    const sh = si === -1 ? DS.stagingShape : DS.shapes[si];
    if (sh && sh.points.length >= 4) {
      // Remove the vertex
      sh.points.splice(vi, 1);
      // Shift edge labels: labels at index ≥ vi shift down by 1
      const rebuilt = {};
      Object.entries(sh.edgeLabels).forEach(([k, v]) => {
        const ki = parseInt(k);
        if (ki < vi)      rebuilt[ki]   = v;
        else if (ki > vi) rebuilt[ki-1] = v;
        // edge at vi (going into deleted vertex) is dropped
      });
      sh.edgeLabels = rebuilt;
      // Recalculate area
      const ip = DS.SCALE / DS.GRID;
      sh.sqFt = +(shoelace(sh.points) * ip * ip / 144).toFixed(1);
      DS.hovVertex = null;
      DS.selEdge = null; hideEdgeLblUI();
      syncFromCanvas(); draw(); summaryUpdate();
    }
    return;
  }

  // In split mode: a click places the split at the hovered point on the selected edge
  if (splitModeEdge) {
    const {si, ei} = splitModeEdge;
    const sh = si===-1 ? DS.stagingShape : DS.shapes[si];
    if (sh) {
      const n=sh.points.length, p1=sh.points[ei], p2=sh.points[(ei+1)%n];
      // Only execute if click is near the edge (within 20px)
      const d = distSeg(raw.x,raw.y,p1.x,p1.y,p2.x,p2.y);
      if (d < 20) {
        // Store the raw point so splitEdge uses it
        DS.selEdgeRaw = raw;
        splitEdge(si, ei);
        return;
      }
    }
    return; // ignore clicks away from edge while in split mode
  }

  // Delete outlet/switch if clicked
  for (let i=DS.outlets.length-1; i>=0; i--) {
    if (Math.hypot(raw.x-DS.outlets[i].x, raw.y-DS.outlets[i].y) < 18) {
      DS.outlets.splice(i,1); syncFromCanvas(); draw(); summaryUpdate(); return;
    }
  }
  for (let i=DS.switches.length-1; i>=0; i--) {
    if (Math.hypot(raw.x-DS.switches[i].x, raw.y-DS.switches[i].y) < 18) {
      DS.switches.splice(i,1); syncFromCanvas(); draw(); summaryUpdate(); return;
    }
  }
  const e = nearestEdge(raw.x, raw.y);
  DS.selEdge = e || null;
  DS.selEdgeRaw = e ? raw : null;
  e ? showEdgeLblUI(e) : hideEdgeLblUI();
  draw();
}

window.setEdgeLabel = function(si, ei, lbl) {
  const sh = si===-1 ? DS.stagingShape : DS.shapes[si];
  if (!sh) return;
  if (lbl==='clear') delete sh.edgeLabels[ei];
  else sh.edgeLabels[ei] = lbl;
  DS.selEdge = null;
  hideEdgeLblUI();
  syncFromCanvas();
  draw(); summaryUpdate();
};

// Split the selected edge at the click point into two separately-labelable sub-edges
window.splitEdge = function(si, ei) {
  const sh = si===-1 ? DS.stagingShape : DS.shapes[si];
  if (!sh) return;
  const n  = sh.points.length;
  const p1 = sh.points[ei], p2 = sh.points[(ei+1)%n];
  // Project raw click onto edge segment, snap to grid
  let splitPt;
  if (DS.selEdgeRaw) {
    const dx=p2.x-p1.x, dy=p2.y-p1.y, l2=dx*dx+dy*dy;
    const t = l2>0 ? Math.max(0.15, Math.min(0.85, ((DS.selEdgeRaw.x-p1.x)*dx+(DS.selEdgeRaw.y-p1.y)*dy)/l2)) : 0.5;
    splitPt = { x: Math.round((p1.x+t*dx)/DS.GRID)*DS.GRID, y: Math.round((p1.y+t*dy)/DS.GRID)*DS.GRID };
  } else {
    splitPt = { x: Math.round((p1.x+p2.x)/2/DS.GRID)*DS.GRID, y: Math.round((p1.y+p2.y)/2/DS.GRID)*DS.GRID };
  }
  // Insert split point after ei
  sh.points.splice(ei+1, 0, splitPt);
  // Shift all edge label indices > ei up by one; ei keeps its old label, ei+1 (new) is unlabeled
  const rebuilt = {};
  Object.entries(sh.edgeLabels).forEach(([k,v]) => {
    const ki = parseInt(k);
    rebuilt[ki <= ei ? ki : ki+1] = v;
  });
  sh.edgeLabels = rebuilt;
  // Recalculate sqFt
  const ip = DS.SCALE/DS.GRID;
  sh.sqFt = +(shoelace(sh.points)*ip*ip/144).toFixed(1);
  splitModeEdge = null;
  if (DS.canvas) DS.canvas.style.cursor = 'pointer';
  // Auto-select the first half so user can label it immediately
  DS.selEdge    = {si, ei};
  DS.selEdgeRaw = null;
  hideEdgeLblUI();
  syncFromCanvas(); draw(); summaryUpdate();
  // Show label UI for the newly split first edge
  showEdgeLblUI({si, ei});
};

// Save the staging section — only when all edges are labeled
// Edit a saved section: pull it back onto canvas as staging shape for relabeling
window.editSection = function(idx) {
  if (DS.stagingShape || DS.inProg.length > 0) {
    if (!confirm('You have an unsaved section in progress. Discard it and edit Section ' + (idx+1) + ' instead?')) return;
  }
  const sh = DS.shapes.splice(idx, 1)[0]; // remove from saved
  DS.stagingShape = { points: sh.points.slice(), sqFt: sh.sqFt, edgeLabels: Object.assign({}, sh.edgeLabels) };
  DS.outlets  = (sh.outlets  || []).slice();
  DS.switches = (sh.switches || []).slice();
  DS.inProg   = [];
  DS.hovVertex = null; // clear any stale vertex reference
  DS.selEdge  = null;
  hideEdgeLblUI();
  setTool('select'); // go straight to label mode so user can edit edges
  syncFromCanvas(); draw(); tipUpdate(); summaryUpdate();
};

window.saveSection = function() {
  if (!DS.stagingShape) return;
  const n = DS.stagingShape.points.length;
  if (Object.keys(DS.stagingShape.edgeLabels).length < n) {
    alert('Please label all edges before saving this section. Click each edge (line) to assign what it meets.');
    return;
  }
  // Attach the current outlets/switches to this section, then clear them
  DS.stagingShape.outlets  = DS.outlets.slice();
  DS.stagingShape.switches = DS.switches.slice();
  DS.shapes.push(DS.stagingShape);
  DS.stagingShape = null;
  DS.inProg   = [];
  DS.outlets  = [];
  DS.switches = [];
  DS.selEdge  = null;
  hideEdgeLblUI();
  setTool('draw');
  syncFromCanvas(); draw(); tipUpdate(); summaryUpdate();
};

// Split mode state: when active, next canvas click on selected edge places the split
let splitModeEdge = null; // {si, ei} — the edge being split

function showEdgeLblUI(edge) {

      ${cur ? `<button class="el-btn" onclick="setEdgeLabel(${edge.si},${edge.ei},'clear')"

    </div>

      ↳ Inside corners are caulked (not grouted) to allow flex as the house settles — included in standard labor.
    </div>` : ''}`;
  el.style.display = 'block';
}

window.enterSplitMode = function(si, ei) {
  splitModeEdge = {si, ei};
  const el = $('edge-label-ui'); if (!el) return;
  el.innerHTML = `
    <div style="margin-bottom:10px">
      <div class="el-title" style="margin-bottom:6px">✂ Split mode — click exactly where you want to divide this edge</div>
      <div style="font-size:13px;color:#8B1A1A;line-height:1.5">
        Hover over the edge on the canvas above — you'll see a <strong style="color:#8B1A1A">red dot</strong> preview.<br>
        Click the edge at the point where you want to split it into two separately-labeled segments.
      </div>
    </div>
    <div style="margin-top:8px">
      <button class="el-btn" onclick="cancelSplitMode()"
        style="background:none;color:#7a7268;border-color:#d5cec4">✕ Cancel split</button>
    </div>`;
  el.style.display = 'block';
  // Switch cursor to crosshair to signal split mode
  if (DS.canvas) DS.canvas.style.cursor = 'crosshair';
};

window.cancelSplitMode = function() {
  splitModeEdge = null;
  if (DS.selEdge) showEdgeLblUI(DS.selEdge);
  else hideEdgeLblUI();
  if (DS.canvas) DS.canvas.style.cursor = 'pointer';
};

function hideEdgeLblUI() {
  splitModeEdge = null;
  const el=$('edge-label-ui'); if(el) el.style.display='none';
}

window.setTool = function(t) {
  DS.tool = t; DS.selEdge=null; hideEdgeLblUI();
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool===t));
  DS.canvas.style.cursor = t==='draw' ? 'crosshair' : t==='select' ? 'pointer' : 'cell';
  draw();
};

window.undoCanvas = function() {
  if (DS.inProg.length > 0) {
    DS.inProg.pop();
  } else if (DS.stagingShape) {
    // Un-close the polygon — put it back into drawing mode
    DS.inProg = DS.stagingShape.points.slice();
    DS.stagingShape = null;
    DS.outlets = []; DS.switches = [];
    DS.selEdge = null; hideEdgeLblUI();
    setTool('draw');
  } else if (DS.shapes.length > 0) {
    // Restore saved shape as staging (with edge labels) so user can re-label rather than re-draw
    const last = DS.shapes.pop();
    DS.stagingShape = { points: last.points.slice(), sqFt: last.sqFt, edgeLabels: Object.assign({}, last.edgeLabels) };
    DS.outlets  = (last.outlets  || []).slice();
    DS.switches = (last.switches || []).slice();
    DS.inProg   = [];
    DS.selEdge  = null; hideEdgeLblUI();
    setTool('select');
  }
  syncFromCanvas(); draw(); tipUpdate(); summaryUpdate();
};
window.clearCanvas = function() {
  if (!confirm('Clear everything — all sections and drawings?')) return;
  DS.shapes=[]; DS.stagingShape=null; DS.inProg=[]; DS.outlets=[]; DS.switches=[];
  DS.selEdge=null; DS.selEdgeRaw=null; hideEdgeLblUI();
  syncFromCanvas(); draw(); tipUpdate(); summaryUpdate();
};
window.changeScale = function(v) {
  const old=DS.SCALE; DS.SCALE=parseInt(v);
  const ratio = old / DS.SCALE;  // e.g. 6→12 = 0.5, so points shrink to represent same real area
  const rescalePt = p => ({ x: Math.round(p.x*ratio/DS.GRID)*DS.GRID, y: Math.round(p.y*ratio/DS.GRID)*DS.GRID });
  const rescaleShape = sh => {
    const pts = sh.points.map(rescalePt);
    const pxA = shoelace(pts), ip = DS.SCALE/DS.GRID;
    return { ...sh, points: pts, sqFt: +(pxA*ip*ip/144).toFixed(1) };
  };
  DS.shapes       = DS.shapes.map(rescaleShape);
  if (DS.stagingShape) DS.stagingShape = rescaleShape(DS.stagingShape);
  DS.inProg   = DS.inProg.map(rescalePt);
  DS.outlets  = DS.outlets.map(rescalePt);
  DS.switches = DS.switches.map(rescalePt);
  syncFromCanvas(); draw(); summaryUpdate();
};

function tipUpdate() {
  const tip  = $('canvas-tip');
  const hint = $('canvas-hint');

  // The in-canvas overlay: only show on a completely empty canvas
  if (tip) {
    if (DS.shapes.length===0 && DS.inProg.length===0 && !DS.stagingShape) {
      tip.style.display='block';
    } else {
      tip.style.display='none';
    }
  }

  // The hint bar below the canvas: contextual guidance that never blocks the drawing
  if (!hint) return;
  if (DS.stagingShape) {
    const n    = DS.stagingShape.points.length;
    const done = Object.keys(DS.stagingShape.edgeLabels).length;
    const left = n - done;
    hint.style.display = 'block';
    hint.innerHTML = `<span class="hint-icon">👆</span>
      <strong>Label all edges before saving.</strong>
      Click each <span style="color:#e8823a;font-weight:700">orange dashed edge</span> to set its border type.
      ${left > 0 ? `<strong style="color:#e8823a">${left} edge${left>1?'s':''} remaining.</strong>` : '<strong style="color:#27ae60">All edges labeled — ready to save!</strong>'}
      &nbsp;·&nbsp; Use <strong>✂ Split here</strong> if one line has two different borders.
      &nbsp;·&nbsp; <strong>Hover a corner dot</strong> (turns red) and click to remove that vertex.`;
  } else if (DS.shapes.length > 0 && DS.inProg.length === 0) {
    hint.style.display = 'block';
    hint.innerHTML = `<span class="hint-icon">✅</span>
      <strong>Section ${DS.shapes.length} saved.</strong>
      Click <strong>+ Add Another Section</strong> below to trace the next wall area, or hit <strong>Continue</strong> when you're done.`;
  } else if (DS.inProg.length > 0) {
    hint.style.display = 'block';
    hint.innerHTML = `<span class="hint-icon">✏️</span>
      Keep clicking corners to trace the perimeter.
      Click near the <strong style="color:#8B1A1A">red starting dot</strong> (or double-click) to close the shape.`;
  } else {
    hint.style.display = 'none';
  }
}

function summaryUpdate() {
  const el=$('canvas-summary'); if(!el) return;
  const hasSaved   = DS.shapes.length > 0;
  const hasStaging = !!DS.stagingShape;
  if (!hasSaved && !hasStaging) { el.style.display='none'; return; }

  // Totals across all saved sections
  const savedTot = DS.shapes.reduce((t,s)=>t+s.sqFt,0);
  let trimLf=0;
  DS.shapes.forEach(sh=>{
    const n=sh.points.length;
    for(let i=0;i<n;i++){
      if(sh.edgeLabels[i]==='trim'){
        const j=(i+1)%n,p1=sh.points[i],p2=sh.points[j];
        trimLf+=Math.hypot(p2.x-p1.x,p2.y-p1.y)*(DS.SCALE/DS.GRID)/12;
      }
    }
  });
  const savedOutlets = DS.shapes.reduce((t,s)=>t+(s.outlets||[]).length+(s.switches||[]).length,0);

  // Staging shape progress
  let stagingBlock = '';
  if (hasStaging) {
    const sh = DS.stagingShape;
    const totalEdges   = sh.points.length;
    const labeledEdges = Object.keys(sh.edgeLabels).length;
    const done         = labeledEdges >= totalEdges;
    const pct          = Math.round(labeledEdges/totalEdges*100);
    stagingBlock = `
      <div style="padding:14px 16px;border-top:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:13px;font-weight:800;color:var(--gold-lt)">Section ${DS.shapes.length+1} — ${sh.sqFt} sq ft</span>
          <span style="font-size:12px;color:${done?'#4caf50':'#e8823a'};font-weight:700">${labeledEdges}/${totalEdges} edges labeled</span>
        </div>
        <div style="background:rgba(255,255,255,0.1);border-radius:99px;height:5px;margin-bottom:10px;overflow:hidden">
          <div style="background:${done?'#4caf50':'#e8823a'};height:100%;border-radius:99px;width:${pct}%;transition:width .3s"></div>
        </div>
        ${done ? `
          <div style="font-size:13px;color:#4caf50;margin-bottom:10px">✅ All edges labeled — ready to save!</div>
          <button onclick="saveSection()" style="width:100%;background:#4caf50;border:none;border-radius:8px;padding:13px 16px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;font-family:inherit;min-height:50px;letter-spacing:0.01em">
            ✓ Save Section
          </button>
        ` : `
          <div style="font-size:13px;color:#e8823a;line-height:1.5">Click the <strong style="color:#e8823a">orange dashed edges</strong> to label what each line meets. All edges must be labeled before you can save.</div>
        `}
      </div>`;
  }

  // Between sections: show "Add Another Section" prompt
  const addAnotherBlock = (hasSaved && !hasStaging && DS.inProg.length===0) ? `
    <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,0.12)">
      <button onclick="setTool('draw')" style="width:100%;background:transparent;border:2px dashed rgba(139,26,26,0.45);border-radius:8px;padding:11px 16px;font-size:14px;font-weight:700;color:var(--gold-lt);cursor:pointer;font-family:inherit;min-height:44px;transition:all .18s"
        onmouseover="this.style.borderColor='var(--gold)';this.style.background='rgba(139,26,26,0.08)'"
        onmouseout="this.style.borderColor='rgba(139,26,26,0.45)';this.style.background='transparent'">
        + Add Another Section
      </button>
    </div>` : '';

  // Saved sections list with Edit buttons
  const secList = DS.shapes.length ? `

          <button onclick="editSection(${i})" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:4px 11px;font-size:12px;font-weight:700;color:#ccc;cursor:pointer;font-family:inherit;white-space:nowrap"
            onmouseover="this.style.background='rgba(139,26,26,0.18)';this.style.color='#fff'"
            onmouseout="this.style.background='rgba(255,255,255,0.08)';this.style.color='#ccc'">
            ✎ Edit
          </button>
        </div>`).join('')}
    </div>` : '';

  el.style.display='block';
  el.innerHTML=`
    ${hasSaved ? `<div style="display:flex;gap:0;align-items:stretch">
      <div class="sum-item"><div class="sum-val">${+(savedTot*1.12).toFixed(1)} sq ft</div><div class="sum-lbl">Saved Total</div></div>
      <div class="sum-div"></div>
      <div class="sum-item"><div class="sum-val">${DS.shapes.length}</div><div class="sum-lbl">Section${DS.shapes.length!==1?'s':''}</div></div>

      <div class="sum-item"><div class="sum-val">${trimLf>0?trimLf.toFixed(1)+' lf':'—'}</div><div class="sum-lbl">Trim</div></div>
      <div class="sum-div"></div>
      <div class="sum-item"><div class="sum-val">${savedOutlets}</div><div class="sum-lbl">Outlets/SW</div></div>

    ${stagingBlock}
    ${addAnotherBlock}`;
}

function draw() {
  if(!DS.ctx) return;
  const {ctx,W,H,GRID,SCALE}=DS;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#eae5de'; ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=GRID){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<=H;y+=GRID){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Foot markers
  ctx.fillStyle='#b8b0a8'; ctx.font='11px -apple-system,sans-serif'; ctx.textAlign='center';
  const sqPF = 12/SCALE;
  for(let sq=sqPF; sq*GRID<W; sq+=sqPF) {
    const xp=sq*GRID, ft=Math.round(sq/sqPF);
    if(ft>0) ctx.fillText(ft+"'", xp, 13);
  }
  ctx.textAlign='left';

  // Helper: draw a labeled shape on canvas
  function drawShape(sh, si, dimmed) {
    const n=sh.points.length;
    // Fill
    ctx.beginPath();
    sh.points.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.closePath();
    ctx.fillStyle = dimmed ? 'rgba(74,144,217,0.04)' : 'rgba(74,144,217,0.09)';
    ctx.fill();
    // Edges
    for(let i=0;i<n;i++){
      const j=(i+1)%n, p1=sh.points[i], p2=sh.points[j];
      const lbl=sh.edgeLabels[i];
      const isHov=DS.hovEdge&&DS.hovEdge.si===si&&DS.hovEdge.ei===i;
      const isSel=DS.selEdge&&DS.selEdge.si===si&&DS.selEdge.ei===i;
      const unlabeled = !lbl;
      ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
      ctx.lineWidth   = isSel?5:isHov?4:lbl?3:2.5;
      // Unlabeled edges glow orange; labeled get their type color; dimmed shapes gray
      ctx.strokeStyle = dimmed ? '#b0b0a8'
                      : isSel  ? '#000'
                      : isHov  ? '#8B1A1A'
                      : lbl    ? EDGE_DEF[lbl].col
                      : '#e8823a'; // unlabeled = orange "needs attention"
      ctx.setLineDash(unlabeled&&!dimmed ? [6,4] : isSel||isHov ? [7,4] : []);
      ctx.stroke(); ctx.setLineDash([]);
      // Label badge
      if(lbl && !dimmed) {
        const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
        ctx.font='bold 11px -apple-system,sans-serif';
        const tw=ctx.measureText(EDGE_DEF[lbl].short).width;
        ctx.fillStyle=EDGE_DEF[lbl].col;
        ctx.beginPath(); rrect(ctx,mx-tw/2-6,my-10,tw+12,20,4); ctx.fill();
        ctx.fillStyle='#fff'; ctx.textAlign='center';
        ctx.fillText(EDGE_DEF[lbl].short,mx,my+4); ctx.textAlign='left';
      }
    }
    // Vertices — in select mode show as deletable handles
    const inSelect = DS.tool==='select' && !dimmed;
    sh.points.forEach((p,vi)=>{
      const isHovV = inSelect && DS.hovVertex && DS.hovVertex.si===si && DS.hovVertex.vi===vi;
      const r = isHovV ? 8 : (inSelect ? 6 : 4);
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2);
      ctx.fillStyle = isHovV ? '#e74c3c' : dimmed ? '#c0c0b8' : '#4a90d9';
      ctx.fill();
      if (inSelect) { ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke(); }
      // Draw × on hover to indicate delete
      if (isHovV) {
        ctx.strokeStyle='#fff'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(p.x-4,p.y-4); ctx.lineTo(p.x+4,p.y+4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(p.x+4,p.y-4); ctx.lineTo(p.x-4,p.y+4); ctx.stroke();
      }
    });
    // Area label
    if (!dimmed) {
      const cx=sh.points.reduce((t,p)=>t+p.x,0)/n;
      const cy=sh.points.reduce((t,p)=>t+p.y,0)/n;
      ctx.font='bold 14px -apple-system,sans-serif'; ctx.textAlign='center';
      ctx.fillStyle='rgba(255,255,255,0.85)';
      const tw2=ctx.measureText(sh.sqFt+' sq ft').width;
      ctx.fillRect(cx-tw2/2-4,cy-10,tw2+8,20);
      ctx.fillStyle='#2a2a2a';
      ctx.fillText(sh.sqFt+' sq ft',cx,cy+5);
      ctx.textAlign='left';
    }
  }

  // Saved shapes are not drawn on canvas — clean workspace for multi-section drawing.
  // A section only appears while actively being worked on (staging). Use Edit to re-enter staging.

  // Staging shape: full color, unlabeled edges orange
  if (DS.stagingShape) drawShape(DS.stagingShape, -1, false);

  // In-progress
  if(DS.inProg.length>0){
    ctx.beginPath();
    DS.inProg.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle='#2a2a2a'; ctx.lineWidth=2; ctx.setLineDash([]); ctx.stroke();
    if(DS.mouse){
      const last=DS.inProg[DS.inProg.length-1];
      ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(DS.mouse.x,DS.mouse.y);
      ctx.strokeStyle='#8B1A1A'; ctx.lineWidth=1.5; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(DS.mouse.x,DS.mouse.y,5,0,Math.PI*2);
      ctx.fillStyle='rgba(139,26,26,0.45)'; ctx.fill();
    }
    DS.inProg.forEach((p,i)=>{
      ctx.beginPath(); ctx.arc(p.x,p.y,i===0?9:5,0,Math.PI*2);
      ctx.fillStyle=i===0?'#8B1A1A':'#2a2a2a'; ctx.fill();
      if(i===0){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(p.x,p.y,9,0,Math.PI*2);ctx.stroke();}
    });
    if(DS.mouse&&DS.inProg.length>=3){
      const f=DS.inProg[0];
      if(Math.hypot(DS.mouse.x-f.x,DS.mouse.y-f.y)<=DS.GRID){
        ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.textAlign='center';
        ctx.font='bold 13px -apple-system,sans-serif';
        const t='Click to close'; const tw=ctx.measureText(t).width;
        ctx.fillRect(f.x-tw/2-6,f.y-28,tw+12,20);
        ctx.fillStyle='#2a2a2a'; ctx.fillText(t,f.x,f.y-14);
        ctx.textAlign='left';
      }
    }
  }

  // Split mode: draw live preview dot on the selected edge as mouse hovers
  if (splitModeEdge && DS.mouse) {
    const {si, ei} = splitModeEdge;
    const sh = si===-1 ? DS.stagingShape : DS.shapes[si];
    if (sh) {
      const n=sh.points.length, p1=sh.points[ei], p2=sh.points[(ei+1)%n];
      const dx=p2.x-p1.x, dy=p2.y-p1.y, l2=dx*dx+dy*dy;
      const d = distSeg(DS.mouse.x, DS.mouse.y, p1.x, p1.y, p2.x, p2.y);
      if (l2>0 && d<30) {
        const t = Math.max(0.1, Math.min(0.9,
          ((DS.mouse.x-p1.x)*dx+(DS.mouse.y-p1.y)*dy)/l2));
        const sx = p1.x+t*dx, sy = p1.y+t*dy;
        // Scissors preview dot — gold with scissors label
        ctx.beginPath(); ctx.arc(sx,sy,8,0,Math.PI*2);
        ctx.fillStyle='#8B1A1A'; ctx.fill();
        ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
        ctx.font='bold 10px -apple-system,sans-serif';
        ctx.textAlign='center'; ctx.fillStyle='#fff';
        ctx.fillText('✂',sx,sy+4); ctx.textAlign='left';
        // Guide lines showing the two resulting segments
        ctx.setLineDash([4,3]);
        ctx.strokeStyle='rgba(139,26,26,0.45)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(sx,sy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(p2.x,p2.y); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  // Outlets & switches
  DS.outlets.forEach(o  => drawSymbol(ctx, o.x, o.y, '#e74c3c', 'OUT'));
  DS.switches.forEach(sw => drawSymbol(ctx, sw.x, sw.y, '#8e44ad', 'SW'));
}

function rrect(ctx,x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawSymbol(ctx, x, y, col, lbl) {
  ctx.fillStyle='#fff'; ctx.strokeStyle=col; ctx.lineWidth=2;
  rrect(ctx, x-13, y-13, 26, 26, 4); ctx.fill(); ctx.stroke();
  // Slots
  ctx.fillStyle=col;
  if(lbl==='OUT') {
    ctx.fillRect(x-5,y-7,4,9); ctx.fillRect(x+1,y-7,4,9);
  } else {
    ctx.beginPath(); ctx.moveTo(x-5,y+5); ctx.lineTo(x+5,y-5);
    ctx.stroke();
  }
  // Text label
  ctx.fillStyle=col; ctx.font='bold 10px -apple-system,sans-serif'; ctx.textAlign='center';
  ctx.fillText(lbl, x, y+22); ctx.textAlign='left';
  // Hover delete hint
  if(DS.tool==='select') {
    ctx.fillStyle='rgba(139,26,26,0.12)'; ctx.strokeStyle='#8B1A1A'; ctx.lineWidth=1;
    rrect(ctx,x-14,y-14,28,28,5); ctx.fill(); ctx.stroke();
  }
}

// Format ft+in as a readable string, e.g. "10' 3\"" or "18\""
function fmtFtIn(ft, inches) {
  ft = parseInt(ft)||0; inches = parseInt(inches)||0;
  if (ft && inches) return ft + "' " + inches + '"';
  if (ft) return ft + "'";
  if (inches) return inches + '"';
  return '—';
}
// Compute sqft from ft+in dimensions
function dimsToSqft(lft, lin, hft, hin) {
  const wIn = (parseInt(lft)||0)*12 + (parseInt(lin)||0);
  const hIn = (parseInt(hft)||0)*12 + (parseInt(hin)||0);
  return wIn && hIn ? +((wIn * hIn) / 144).toFixed(1) : 0;
}
// Normalize _sections to the canonical {lft,lin,hft,hin,confirmed} shape
function normalizeSections(arr) {
  arr = arr || [];
  if (!arr.length) arr = [{}];
  return arr.map(s => ({
    lft: s.lft||'', lin: s.lin||'', hft: s.hft||'', hin: s.hin||'',
    confirmed: s.confirmed || false,
  }));
}
// Total sqft from all confirmed walls
function confirmedSqft() {
  return (S._sections||[]).filter(s=>s.confirmed).reduce((t,s)=>t+dimsToSqft(s.lft,s.lin,s.hft,s.hin), 0);
}

        </div>
        <div class="opt${S.manualComplexity==='complex'?' sel':''}" onclick="setManualComplexity('complex')" style="cursor:pointer">

function setMeasureMode(mode) {
  S.measureMode = mode;
  document.querySelectorAll('.mpath-card').forEach(c=>{
    c.classList.toggle('active', c.dataset.mode===mode);
  });
  // Remove old mode content
  const card = document.querySelector('.cb-card');
  const after = $('mpath-grid').nextElementSibling;
  let el = after;
  while(el){ const nx=el.nextElementSibling; el.remove(); el=nx; }
  // Inject new
  const tmp = document.createElement('div');
  tmp.innerHTML = mode==='draw' ? renderDraw() : renderManual();
  while(tmp.firstChild) card.appendChild(tmp.firstChild);
  if(mode==='draw')   requestAnimationFrame(()=>initCanvas());
  if(mode==='manual') bindManual();
}

function bindManual() {
  S._sections = normalizeSections(S._sections);

  // Live preview: update the "= X sq ft" as user types (before saving)
  const livePreview = (i) => {
    const lft=parseFloat($(`mlf${i}`)?.value)||0, lin=parseFloat($(`mli${i}`)?.value)||0;
    const hft=parseFloat($(`mhf${i}`)?.value)||0, hin=parseFloat($(`mhi${i}`)?.value)||0;
    const sf = dimsToSqft(lft, lin, hft, hin);
    const el=$(`msf${i}`); if(el) el.querySelector('span').textContent=sf>0?sf+' sq ft':'—';
  };
  S._sections.forEach((_,i)=>{
    if (!S._sections[i].confirmed)
      [$(`mlf${i}`),$(`mli${i}`),$(`mhf${i}`),$(`mhi${i}`)].forEach(el=>el?.addEventListener('input',()=>livePreview(i)));
  });

  // Save a wall: read inputs, mark confirmed, re-render
  window.saveWall = (i) => {
    const lft=parseFloat($(`mlf${i}`)?.value)||0, lin=parseFloat($(`mli${i}`)?.value)||0;
    const hft=parseFloat($(`mhf${i}`)?.value)||0, hin=parseFloat($(`mhi${i}`)?.value)||0;
    if (!dimsToSqft(lft, lin, hft, hin)) {
      alert('Please enter a width and a height before saving this wall.');
      return;
    }
    S._sections[i] = { lft, lin, hft, hin, confirmed: true };
    S.sqft = confirmedSqft();
    updEstBar();
    setMeasureMode('manual');
  };

  // Edit a saved wall: un-confirm it and re-render
  window.editWall = (i) => {
    S._sections[i].confirmed = false;
    S.sqft = confirmedSqft();
    updEstBar();
    setMeasureMode('manual');
  };

  window.addSec=()=>{ if(S._sections.length<6){S._sections.push({lft:'',lin:'',hft:'',hin:'',confirmed:false});setMeasureMode('manual');} };
  window.rmSec=i=>{ S._sections.splice(i,1); S.sqft=confirmedSqft(); updEstBar(); setMeasureMode('manual'); };
  window.setManualComplexity=c=>{ S.manualComplexity=c; updEstBar();
    document.querySelectorAll('#mpath-grid ~ div .opt').forEach(el=>{
      const v=el.getAttribute('onclick')||'';
      el.classList.toggle('sel', v.includes("'"+c+"'"));
    });
  };
}

// Estimated working days: min 2 (tile day + grout day), then 1 day per 8 field hours
function calcDays(totalHrs) {
  const fieldHrs = Math.max(0, totalHrs - 4);
  return Math.max(2, Math.ceil(fieldHrs / 8) + 1);
}

// SVG thumbnail for a manual-entry wall (rectangle with labeled dimensions)
// ── Tile hatch helpers ─────────────────────────────────────────────────────────

function buildHatchDef(id, pW, pH, GC, content, xfm, offX, offY) {
  const tr = xfm ? ` patternTransform="${xfm}"` : '';
  return {
    def:  `<pattern id="${id}" x="${+offX.toFixed(1)}" y="${+offY.toFixed(1)}" width="${+pW.toFixed(1)}" height="${+pH.toFixed(1)}" patternUnits="userSpaceOnUse"${tr}><rect width="${+pW.toFixed(1)}" height="${+pH.toFixed(1)}" fill="${GC}"/>${content}</pattern>`,
    fill: `url(#${id})`
  };
}

// Returns {def, fill} for an SVG tile-hatch <pattern>.
// svgPxPerFt = how many SVG user-units represent one real foot.
// offX/offY = shape origin in the SVG, so the pattern phase is anchored there.
function genTileHatch(id, svgPxPerFt, offX, offY) {
  const pxPI = svgPxPerFt / 12;
  const fmt  = S.tileFormat || 'medium';
  const pat  = S.pattern    || 'straight';
  const SZ   = {'tiny-mosaic':[2,2],'subway':[6,3],'medium':[6,6],'large':[12,12],'jumbo':[24,24]};
  const [ti, hi_] = SZ[fmt] || [6,6];
  // Scale both dimensions together so tile aspect ratio is preserved
  let tW = ti * pxPI, tH = hi_ * pxPI;
  const maxD = Math.max(tW, tH);
  if (maxD > 68) { tW *= 68/maxD; tH *= 68/maxD; }
  const minD = Math.min(tW, tH);
  if (minD < 8)  { tW *= 8/minD;  tH *= 8/minD;  }
  tW = +tW.toFixed(1); tH = +tH.toFixed(1);

  // Grout line thickness from joint selection
  const groutPx = {'no-spacer':0.7, sixteenth:1.2, eighth:1.9, quarter:3.2};
  const g = groutPx[S.groutJoint] || 1.9;

  // Tile + grout colors by tile type
  const PAL = {
    ceramic:        {tc:'#f4f0ea', tc2:'#ddd8ce', gc:'#c4bcb0'},
    porcelain:      {tc:'#e6e4e0', tc2:'#d4d0cc', gc:'#b0ada8'},
    glass:          {tc:'#c8dcea', tc2:'#a4c4da', gc:'#7aaac4'},
    stone:          {tc:'#d8ccb8', tc2:'#c4b8a4', gc:'#a49070'},
    mosaic:         {tc:'#e8d8c0', tc2:'#d4c4ac', gc:'#b09078'},
    'large-format': {tc:'#dcdad4', tc2:'#c8c6c0', gc:'#a4a09a'},
  };
  const pal = PAL[S.tileType] || PAL.ceramic;
  const TC  = pal.tc;   // primary tile face
  const TC2 = pal.tc2;  // secondary tone (herringbone V-tiles)
  const GC  = pal.gc;   // grout

  const rect = (x,y,w,h,fill) =>
    `<rect x="${+(x+g/2).toFixed(1)}" y="${+(y+g/2).toFixed(1)}" width="${+(w-g).toFixed(1)}" height="${+(h-g).toFixed(1)}" fill="${fill||TC}"/>`;

  let pW, pH, content = '', xfm = '';

  switch (pat) {
    case 'straight':
      pW=tW; pH=tH; content=rect(0,0,tW,tH); break;
    case 'vertical':
      [tW,tH]=[tH,tW]; pW=tW; pH=tH; content=rect(0,0,tW,tH); break;
    case 'running-bond':
      pW=tW; pH=tH*2;
      content=rect(0,0,tW,tH)+rect(-tW/2,tH,tW,tH)+rect(tW/2,tH,tW,tH); break;
    case 'third-offset':
      pW=tW; pH=tH*2;
      content=rect(0,0,tW,tH)+rect(tW/3,tH,tW,tH)+rect(tW/3-tW,tH,tW,tH); break;
    case 'third-stairstep':
      pW=tW; pH=tH*3;
      content=rect(0,0,tW,tH)
             +rect(tW/3,tH,tW,tH)+rect(tW/3-tW,tH,tW,tH)
             +rect(2*tW/3,tH*2,tW,tH)+rect(2*tW/3-tW,tH*2,tW,tH); break;
    case 'diagonal':
      pW=tW; pH=tH; content=rect(0,0,tW,tH);
      xfm=`rotate(45 ${+offX.toFixed(1)} ${+offY.toFixed(1)})`; break;
    case 'herringbone': {
      const u=+(tW+tH).toFixed(1); pW=u; pH=u;
      // Two-tone: H-tiles (TC) vs V-tiles (TC2) so pattern reads clearly
      content=rect(0,0,tW,tH,TC)+rect(tW,0,tH,tW,TC2)+rect(0,tH,tH,tW,TC2)+rect(tH,tW,tW,tH,TC); break;
    }
    case 'chevron': {
      const dx=+(tH*0.5).toFixed(1); pW=+((tW+dx)*2).toFixed(1); pH=+(tH*2).toFixed(1);
      const g2=g/2;
      const para=(x,y,lean)=>`<polygon points="${+(x+lean*dx+g2).toFixed(1)},${+(y+g2).toFixed(1)} ${+(x+tW+lean*dx-g2).toFixed(1)},${+(y+g2).toFixed(1)} ${+(x+tW-g2).toFixed(1)},${+(y+tH-g2).toFixed(1)} ${+(x+g2).toFixed(1)},${+(y+tH-g2).toFixed(1)}" fill="${TC}"/>`;
      content=para(0,0,1)+para(tW+dx,0,-1)+para(0,tH,-1)+para(tW+dx,tH,1); break;
    }
    case 'hexagon': {
      const h=+(Math.max(5, Math.min(36, tW/2)).toFixed(1));
      const w=+(h*Math.sqrt(3)).toFixed(1);
      pW=w; pH=+(h*3).toFixed(1);
      const ptH=(cx,cy)=>{
        const pts=[0,1,2,3,4,5].map(n=>{
          const a=(n*60-30)*Math.PI/180;
          return `${+(cx+(h-g/2)*Math.cos(a)).toFixed(1)},${+(cy+(h-g/2)*Math.sin(a)).toFixed(1)}`;
        }).join(' ');
        return `<polygon points="${pts}" fill="${TC}" stroke="${GC}" stroke-width="${g}"/>`;
      };
      // Two hex positions tile the full hex grid via pattern repetition
      content=ptH(w/2,h)+ptH(0,h*2.5);
      return buildHatchDef(id,pW,pH,GC,content,xfm,offX,offY);
    }
    case 'penny': {
      const r=+(tW/2).toFixed(1); pW=tW+g; pH=tH+g;
      content=`<circle cx="${+(pW/2).toFixed(1)}" cy="${+(pH/2).toFixed(1)}" r="${+(r-g/2).toFixed(1)}" fill="${TC}"/>`; break;
    }
    case 'random-stone':
      pW=+(tW*3).toFixed(1); pH=+(tH*2).toFixed(1);
      content=rect(0,0,tW*1.4,tH)+rect(tW*1.4,0,tW*1.6,tH)
             +rect(0,tH,tW*0.8,tH)+rect(tW*0.8,tH,tW*1.3,tH)+rect(tW*2.1,tH,tW*0.9,tH); break;
    default:
      pW=tW; pH=tH; content=rect(0,0,tW,tH);
  }
  return buildHatchDef(id, pW, pH, GC, content, xfm, offX, offY);
}

// ── SVG: manual-entry wall rectangle with tile hatch ─────────────────────────

function wallSVGManual(s, idx) {
  idx = idx ?? '0';
  const wIn = (parseInt(s.lft)||0)*12 + (parseInt(s.lin)||0);
  const hIn = (parseInt(s.hft)||0)*12 + (parseInt(s.hin)||0);
  const VW=420, VH=220, pad=28;
  const ar = wIn && hIn ? wIn/hIn : 2.5;
  let sw = VW-pad*2, sh;
  if (ar >= 1) { sh = Math.min(VH-pad*2, Math.round(sw/ar)); }
  else         { sh = VH-pad*2; sw = Math.min(VW-pad*2, Math.round(sh*ar)); }
  sw=Math.max(sw,50); sh=Math.max(sh,30);
  const ox=Math.round((VW-sw)/2), oy=Math.round((VH-sh)/2);
  const sf = dimsToSqft(s.lft,s.lin,s.hft,s.hin);
  const realFt = wIn ? wIn/12 : 4;
  const hatch  = genTileHatch('wh'+idx, sw/realFt, ox, oy);
  const cid    = 'wc'+idx;
  return `<svg viewBox="0 0 ${VW} ${VH}" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="display:block;max-width:${VW}px">
    <defs>${hatch.def}<clipPath id="${cid}"><rect x="${ox}" y="${oy}" width="${sw}" height="${sh}"/></clipPath></defs>
    <rect width="${VW}" height="${VH}" fill="#f7f4f1"/>
    <rect x="${ox}" y="${oy}" width="${sw}" height="${sh}" fill="${hatch.fill}" clip-path="url(#${cid})"/>
    <rect x="${ox}" y="${oy}" width="${sw}" height="${sh}" fill="none" stroke="#8B1A1A" stroke-width="2.5"/>
    <text x="${VW/2}" y="${oy-8}" text-anchor="middle" font-size="12" fill="#7a7268" font-family="sans-serif">${fmtFtIn(s.lft,s.lin)}</text>
    <text x="${ox-7}" y="${oy+Math.round(sh/2)+4}" text-anchor="end" font-size="12" fill="#7a7268" font-family="sans-serif">${fmtFtIn(s.hft,s.hin)}</text>
    <text x="${VW/2}" y="${oy+Math.round(sh/2)+5}" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a1a" stroke="rgba(255,255,255,0.9)" stroke-width="4" paint-order="stroke" font-family="sans-serif">${sf} sq ft</text>
  </svg>`;
}

// ── SVG: drawn polygon section — tile hatch, colored edges, outlets ──────────

function shapeSVGDraw(sh, idx) {
  idx = idx ?? '0';
  const pts = sh.points || [];
  if (pts.length < 3) return '';
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs);
  const minY=Math.min(...ys), maxY=Math.max(...ys);
  const rangeX=maxX-minX||1, rangeY=maxY-minY||1;
  const VW=480, VH=280, pad=38; // extra pad for dimension labels
  const sc = Math.min((VW-pad*2)/rangeX, (VH-pad*2)/rangeY);
  const offX = +(pad+((VW-pad*2)-rangeX*sc)/2).toFixed(1);
  const offY = +(pad+((VH-pad*2)-rangeY*sc)/2).toFixed(1);
  const tx = x => +((x-minX)*sc+parseFloat(offX)).toFixed(1);
  const ty = y => +((y-minY)*sc+parseFloat(offY)).toFixed(1);
  const poly = pts.map(p=>`${tx(p.x)},${ty(p.y)}`).join(' ');
  const cid  = 'sc'+idx;
  const realScale = (DS.SCALE||6) * sc;
  const hatch = genTileHatch('sh'+idx, realScale, parseFloat(offX), parseFloat(offY));
  // Use EDGE_DEF colors (matches labeling UI)
  const getCol = lbl => (EDGE_DEF[lbl]&&EDGE_DEF[lbl].col)||'#8B1A1A';
  const getAbbr= lbl => (EDGE_DEF[lbl]&&EDGE_DEF[lbl].short)||lbl;
  // Centroid in SVG coords (for offset direction)
  const cxf = pts.reduce((s,p)=>s+tx(p.x),0)/pts.length;
  const cyf = pts.reduce((s,p)=>s+ty(p.y),0)/pts.length;
  // Color-coded edge lines
  const edgeLines = pts.map((p,i)=>{
    const q  =pts[(i+1)%pts.length];
    const lbl=(sh.edgeLabels||{})[i];
    const col=lbl?getCol(lbl):'#8B1A1A';
    return `<line x1="${tx(p.x)}" y1="${ty(p.y)}" x2="${tx(q.x)}" y2="${ty(q.y)}" stroke="${col}" stroke-width="${lbl?4:2.5}" stroke-linecap="round"/>`;
  }).join('');
  // Mid-edge labels: abbreviation + dimension
  const edgeLbls = pts.map((p,i)=>{
    const q  =pts[(i+1)%pts.length];
    const lbl=(sh.edgeLabels||{})[i];
    const svgLen = Math.hypot(tx(q.x)-tx(p.x), ty(q.y)-ty(p.y));
    if (svgLen < 18) return '';
    const mx = (tx(p.x)+tx(q.x))/2;
    const my = (ty(p.y)+ty(q.y))/2;
    // Offset outward from centroid
    const ddx = mx-cxf, ddy = my-cyf;
    const dd = Math.hypot(ddx,ddy)||1;
    const offset = 16;
    const lx = (mx+ddx/dd*offset).toFixed(1);
    const ly = (my+ddy/dd*offset).toFixed(1);
    // Real dimension
    const realIn = Math.hypot(q.x-p.x,q.y-p.y) * ((DS.SCALE||6)/24);
    const ft = Math.floor(realIn/12), inches = Math.round(realIn%12);
    const dimStr = ft>0 ? (inches>0?`${ft}'${inches}"`:`${ft}'`) : `${Math.round(realIn)}"`;
    const col = lbl?getCol(lbl):'#555';
    const abbr = lbl?getAbbr(lbl):'';
    const label = abbr ? `${abbr} · ${dimStr}` : dimStr;
    return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="9.5" font-weight="800" fill="${col}" stroke="rgba(255,255,255,0.95)" stroke-width="3" paint-order="stroke" font-family="sans-serif">${label}</text>`;
  }).join('');
  // Centroid label
  const cx=(pts.reduce((s,p)=>s+tx(p.x),0)/pts.length).toFixed(1);
  const cy=(pts.reduce((s,p)=>s+ty(p.y),0)/pts.length).toFixed(1);
  // Outlet icons
  const outlets=(sh.outlets||[]).map(o=>`<g transform="translate(${tx(o.x)},${ty(o.y)})">
    <rect x="-10" y="-11" width="20" height="22" fill="white" stroke="#333" stroke-width="1.5" rx="3"/>
    <ellipse cx="-3" cy="-3" rx="2.2" ry="3" fill="none" stroke="#444" stroke-width="1.2"/>
    <ellipse cx="3" cy="-3" rx="2.2" ry="3" fill="none" stroke="#444" stroke-width="1.2"/>
    <rect x="-1.8" y="2" width="3.6" height="4.5" rx="1" fill="#444"/>
  </g>`).join('');
  // Switch icons
  const switches=(sh.switches||[]).map(o=>`<g transform="translate(${tx(o.x)},${ty(o.y)})">
    <rect x="-10" y="-11" width="20" height="22" fill="white" stroke="#555" stroke-width="1.5" rx="3"/>
    <rect x="-5" y="-7" width="10" height="14" fill="none" stroke="#555" stroke-width="1.2" rx="2"/>
    <rect x="-3.5" y="-6" width="7" height="6" fill="#777" rx="1"/>
  </g>`).join('');
  // HTML legend below SVG (full names)
  const usedLbls=[...new Set(Object.values(sh.edgeLabels||{}))];
  const hasOut=(sh.outlets||[]).length>0, hasSw=(sh.switches||[]).length>0;
  const pillStyle = (col) => `display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #ddd;border-radius:20px;padding:4px 11px 4px 7px;font-size:12px;font-weight:700;color:#333`;
  const legendPills = usedLbls.map(lbl=>{
    const def=EDGE_DEF[lbl]; if(!def) return '';
    return `<span style="${pillStyle(def.col)}"><span style="width:10px;height:10px;border-radius:50%;background:${def.col};flex-shrink:0"></span>${def.label}</span>`;
  }).join('');
  const outPill = hasOut?`<span style="${pillStyle('#333')}"><span style="width:10px;height:10px;border-radius:2px;background:#fff;border:1.5px solid #333;flex-shrink:0"></span>Outlet</span>`:'';
  const swPill  = hasSw ?`<span style="${pillStyle('#555')}"><span style="width:10px;height:10px;border-radius:2px;background:#eee;border:1.5px solid #555;flex-shrink:0"></span>Switch</span>`:'';
  const legendHTML = (legendPills||outPill||swPill) ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">${legendPills}${outPill}${swPill}</div>` : '';
  return `<div>
  <svg viewBox="0 0 ${VW} ${VH}" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="display:block;border-radius:8px;overflow:visible">
    <defs>${hatch.def}<clipPath id="${cid}"><polygon points="${poly}"/></clipPath></defs>
    <rect width="${VW}" height="${VH}" fill="#f0ece6" rx="6"/>
    <polygon points="${poly}" fill="${hatch.fill}" clip-path="url(#${cid})"/>
    ${edgeLines}
    ${outlets}${switches}
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle" font-size="16" font-weight="bold" fill="#1a1a1a" stroke="rgba(255,255,255,0.9)" stroke-width="5" paint-order="stroke" font-family="sans-serif">${sh.sqFt} sq ft</text>
    ${edgeLbls}
  </svg>
  ${legendHTML}
  </div>`;
}

// ── Per-wall breakdown used in Step 9 render ─────────────────────────────────

function wallsSection() {
  if (S.measureMode === 'manual') {
    const confirmed = (S._sections||[]).filter(s=>s.confirmed);
    if (!confirmed.length) return '';
    const rows = confirmed.map((s,i) => {
      const sf = dimsToSqft(s.lft,s.lin,s.hft,s.hin);
      return `<div style="padding:14px 0;border-bottom:1px solid var(--gray-2)">
        <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:8px">Wall ${i+1} &mdash; ${fmtFtIn(s.lft,s.lin)} &times; ${fmtFtIn(s.hft,s.hin)} = ${sf} sq ft</div>
        ${wallSVGManual(s, i)}
      </div>`;
    }).join('');
    return `<div class="res-table">
      <div style="font-size:15px;font-weight:800;color:var(--charcoal);margin-bottom:6px">Wall Measurements</div>
      ${rows}
      <div class="res-row" style="padding-top:10px;margin-top:4px">
        <span><strong>Total area</strong></span><span><strong>${S.sqft} sq ft</strong></span>
      </div>
    </div>`;
  }
  if (S.measureMode === 'draw' && DS.shapes.length) {
    const rows = DS.shapes.map((sh,i) => `
      <div style="padding:14px 0;border-bottom:1px solid var(--gray-2)">
        <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:8px">Section ${i+1} &mdash; ${sh.sqFt} sq ft</div>
        ${shapeSVGDraw(sh, i)}
      </div>`).join('');
    return `<div class="res-table">
      <div style="font-size:15px;font-weight:800;color:var(--charcoal);margin-bottom:6px">Space Sections</div>
      ${rows}
      <div class="res-row" style="padding-top:10px;margin-top:4px">
        <span><strong>Total area</strong></span><span><strong>${S.sqft} sq ft</strong></span>
      </div>
    </div>`;
  }
  if (S.sqft) {
    return `<div class="res-table">
      <div style="font-size:15px;font-weight:800;color:var(--charcoal);margin-bottom:10px">Area</div>
      <div class="res-row"><span>Total area</span><span><strong>${S.sqft} sq ft</strong></span></div>
    </div>`;
  }
  return '';
}

      ${opt('pattern','hexagon',          PICONS.hexagon,           'Hexagon',                        'Six-sided tiles in a honeycomb grid',                '+ ~30% labor',            'Each edge-to-edge connection requires careful alignment. Stunning with contrasting grout. Available in large (12") and small (2") formats.')}
      ${opt('pattern','penny',            PICONS.penny,             'Penny / Round Mosaic',           'Small circular tiles on mesh backing',               '+ ~15% labor',            'Mesh-backed sheets make installation manageable, but hundreds of grout joints still need careful filling and finishing. A vintage or modern look depending on grout color.')}
      ${opt('pattern','complex',          PICONS.complex,           'Custom / Medallion',             'Inlays, basketweave, mixed tile patterns',            '+ 75–100% labor',         'Fully project-specific. We love these challenges. Your on-site quote will nail down the exact number.')}
    </div>`;},
    bind(){bindOpts('pattern');}, validate(){return!!S.pattern;}},

  // 4 — Grout

          ${opt('groutJoint','eighth',
            `<svg viewBox="0 0 64 32" width="64" height="32" xmlns="http://www.w3.org/2000/svg">
              <rect x="2"  y="4" width="25" height="24" rx="1" fill="#e8e0d4" stroke="#9a9188" stroke-width="1.5"/>

            </svg>`,
            '1/8" Spacer','Our most popular — clean, balanced, works with anything','Best all-around choice','Works with virtually any tile. Our default for subway and porcelain. Grout line is visible but refined — the industry sweet spot.')}
          ${opt('groutJoint','quarter',
            `<svg viewBox="0 0 64 32" width="64" height="32" xmlns="http://www.w3.org/2000/svg">
              <rect x="2"  y="4" width="22" height="24" rx="1" fill="#e8e0d4" stroke="#9a9188" stroke-width="1.5"/>
              <rect x="38" y="4" width="22" height="24" rx="1" fill="#e8e0d4" stroke="#9a9188" stroke-width="1.5"/>

            '1/4" Spacer','Wide joint — farmhouse, handmade, and rustic styles','Good for non-rectified and natural stone tile','Used with Saltillo, terracotta, Zellige, and natural stone. Grout lines become a visible design element. Hides size variation in irregular tiles.')}

  // 5 — Edge Treatment
  { badge:'Step 6 of 10', prog:60, title:'How will the edges be finished?', sub:'Where tile ends needs a clean, professional finish. This is a visible quality tell.',
    render(){
      const showLf = S.edgeTreat && S.edgeTreat!=='none';

      return `

        <div class="opts">
          ${opt('edgeTreat','bullnose',
            `<svg viewBox="0 0 72 44" width="72" height="44" xmlns="http://www.w3.org/2000/svg" overflow="hidden">
              <!-- BULLNOSE: field tiles + rounded-edge tile in SAME color. Bezier clips at x=72
                   to produce a clear convex curve profile — the defining bullnose feature. -->
              <rect width="72" height="44" fill="#9a9188"/>
              <!-- Field tiles col 1 -->
              <rect x="1" y="2"  width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="16" width="20" height="12" fill="#e8e2d8"/>
              <rect x="1" y="30" width="20" height="12" fill="#e8e2d8"/>
